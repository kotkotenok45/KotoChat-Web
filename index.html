<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1c1c1e">

    <style>
        :root { 
            --bg: #000; 
            --panel: #1c1c1e; 
            --accent: #0a84ff; 
            --text: #fff; 
            --border: #38383a; 
            --input-bg: #2c2c2e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Адаптация для ПК */
        @media (min-width: 768px) {
            body { background-color: #080808; }
            header, #main-view, #input-wrapper, nav, #auth-overlay {
                max-width: 500px;
                margin: 0 auto;
                left: 50% !important;
                transform: translateX(-50%);
                border-left: 0.5px solid var(--border);
                border-right: 0.5px solid var(--border);
            }
        }

        /* ЭКРАН ВХОДА */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 24px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card img { width: 90px; height: 90px; align-self: center; margin-bottom: 10px; border-radius: 20px; }
        input { background: var(--input-bg); border: none; color: #fff; padding: 15px; border-radius: 14px; font-size: 16px; width: 100%; }
        button.primary { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        button.primary:active { opacity: 0.8; }

        /* ШАПКА */
        header { 
            padding: calc(env(safe-area-inset-top) + 10px) 20px 10px; 
            background: rgba(28, 28, 30, 0.8); 
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        #header-title { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-view { flex: 1; overflow-y: auto; padding-bottom: 140px; }
        .chat-container { display: flex; flex-direction: column; padding: 15px; gap: 8px; }

        /* СООБЩЕНИЯ */
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 16px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.in { align-self: flex-start; background: #262629; border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .sender-name { font-size: 11px; opacity: 0.5; margin-bottom: 3px; display: block; font-weight: 600; }

        /* СПИСКИ */
        .list-item { padding: 16px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 15px; background: var(--panel); transition: background 0.2s; }
        .list-item:active { background: #2c2c2e; }
        .avatar { width: 48px; height: 48px; background: #3a3a3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; color: #fff; }

        /* ПОЛЕ ВВОДА (ФИКСИРОВАННОЕ) */
        #input-wrapper { 
            position: fixed; 
            bottom: calc(env(safe-area-inset-bottom) + 60px); 
            left: 0; right: 0; 
            background: var(--panel); 
            border-top: 0.5px solid var(--border); 
            padding: 10px 15px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
            z-index: 90;
        }
        #message-input { background: #000; flex: 1; border-radius: 22px; padding: 10px 18px; font-size: 16px; border: 1px solid var(--border); }
        #target-badge { position: absolute; top: -28px; left: 15px; background: #ffd600; color: #000; font-size: 10px; padding: 4px 10px; border-radius: 10px; font-weight: 800; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* НИЖНЕЕ МЕНЮ */
        nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: rgba(28, 28, 30, 0.94); 
            backdrop-filter: blur(25px); 
            border-top: 0.5px solid var(--border); 
            display: flex; 
            justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom); 
            padding-top: 8px; 
            z-index: 100; 
            height: calc(env(safe-area-inset-bottom) + 60px); 
        }
        .nav-item { color: #8e8e93; font-size: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 24px; }

        .fab { position: fixed; right: 20px; bottom: calc(env(safe-area-inset-bottom) + 80px); background: var(--accent); width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 15px rgba(10,132,255,0.4); z-index: 95; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <img src="logo.png" alt="K" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3064/3064197.png'">
        <h2 style="margin:0; font-size:24px; letter-spacing:-1px;">KotoChat</h2>
        <input type="text" id="reg-id" placeholder="Ваш ID (логин)" spellcheck="false">
        <input type="text" id="reg-name" placeholder="Отображаемое имя">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button class="primary" id="auth-main-btn" onclick="auth('register')">Создать аккаунт</button>
        <button style="background:none; border:none; color:var(--accent); font-size:14px; font-weight:500;" id="auth-toggle-btn" onclick="toggleAuth()">Уже есть аккаунт? Войти</button>
    </div>
</div>

<header>
    <div id="header-title">Общий чат</div>
    <button id="install-btn" class="hidden" style="background:var(--accent); border:none; color:#fff; padding:6px 12px; border-radius:12px; font-size:11px; font-weight:700;">УСТАНОВИТЬ</button>
</header>

<div id="main-view">
    <div id="chat-container" class="chat-container"></div>
</div>

<div id="input-wrapper">
    <span id="target-badge">ЛС</span>
    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
    <button onclick="send()" style="background:none; border:none; color:var(--accent); font-weight:700; font-size:16px; padding:0 10px;">Отпр.</button>
</div>

<nav>
    <div class="nav-item active" onclick="switchTab('global', this)">
        <span class="nav-icon">💬</span>
        <span>Чаты</span>
    </div>
    <div class="nav-item" onclick="switchTab('contacts', this)">
        <span class="nav-icon">👤</span>
        <span>Контакты</span>
    </div>
    <div class="nav-item" onclick="switchTab('settings', this)">
        <span class="nav-icon">⚙️</span>
        <span>Настройки</span>
    </div>
</nav>

<div id="add-fab" class="fab hidden" onclick="addContact()">+</div>

<script>
    // --- ПРОВЕРКА PWA И УСТАНОВКА ---
    let deferredPrompt;
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const btn = document.getElementById('install-btn');
        btn.classList.remove('hidden');
        btn.onclick = () => {
            deferredPrompt.prompt();
            btn.classList.add('hidden');
        };
    });

    // --- ЛОГИКА ЧАТА ---
    const ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
    let myId, myName;
    let currentTab = 'global';
    let privateTarget = null;
    let friends = JSON.parse(localStorage.getItem('koto_friends') || '[]');

    function auth(type) {
        const userId = document.getElementById('reg-id').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const password = document.getElementById('reg-pass').value.trim();
        if (!userId || !password) return alert("Заполните поля!");
        ws.send(JSON.stringify({ type, userId, name, password }));
    }

    function toggleAuth() {
        const isReg = document.getElementById('reg-name').style.display !== 'none';
        document.getElementById('reg-name').style.display = isReg ? 'none' : 'block';
        document.getElementById('auth-main-btn').textContent = isReg ? 'Войти' : 'Создать аккаунт';
        document.getElementById('auth-main-btn').onclick = () => auth(isReg ? 'login' : 'register');
        document.getElementById('auth-toggle-btn').textContent = isReg ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти';
    }

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'auth_success') {
            myId = data.userId; myName = data.name;
            document.getElementById('auth-overlay').classList.add('hidden');
        } else if (data.type === 'history') {
            document.getElementById('chat-container').innerHTML = '';
            data.messages.forEach(renderMsg);
        } else if (data.type === 'text') {
            if (currentTab === 'global' && !data.targetId) renderMsg(data);
            else if (currentTab === 'private' && (data.senderId === privateTarget || data.targetId === privateTarget)) renderMsg(data);
        } else if (data.type === 'error') alert(data.text);
    };

    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        const view = document.getElementById('main-view');
        const inputWrap = document.getElementById('input-wrapper');
        const fab = document.getElementById('add-fab');
        const title = document.getElementById('header-title');
        
        view.innerHTML = '';
        inputWrap.classList.add('hidden');
        fab.classList.add('hidden');
        document.getElementById('target-badge').style.display = 'none';

        if (tab === 'global') {
            title.textContent = 'Общий чат';
            inputWrap.classList.remove('hidden');
            view.innerHTML = '<div id="chat-container" class="chat-container"></div>';
            ws.send(JSON.stringify({ type: 'login', userId: myId, password: "" })); // Обновить историю
        } else if (tab === 'contacts') {
            title.textContent = 'Контакты';
            fab.classList.remove('hidden');
            friends.forEach(f => {
                view.innerHTML += `
                <div class="list-item" onclick="openPrivateChat('${f.id}', '${f.name}')">
                    <div class="avatar">${f.name[0].toUpperCase()}</div>
                    <div style="flex:1"><b>${f.name}</b><div style="font-size:12px; color:#8e8e93">ID: ${f.id}</div></div>
                </div>`;
            });
        } else if (tab === 'settings') {
            title.textContent = 'Настройки';
            view.innerHTML = `<div style="padding:40px 20px; text-align:center;">
                <div class="avatar" style="width:80px; height:80px; margin:0 auto 15px; font-size:30px;">${myName[0]}</div>
                <h2 style="margin:0">${myName}</h2>
                <p style="color:var(--accent)">ID: ${myId}</p>
                <button onclick="location.reload()" style="margin-top:30px; background:#333; color:red; border:none; padding:10px 20px; border-radius:10px;">Выйти</button>
            </div>`;
        }
    }

    function openPrivateChat(id, name) {
        currentTab = 'private';
        privateTarget = id;
        document.getElementById('header-title').textContent = name;
        document.getElementById('input-wrapper').classList.remove('hidden');
        document.getElementById('target-badge').style.display = 'block';
        document.getElementById('target-badge').textContent = 'ЛС: ' + name;
        document.getElementById('main-view').innerHTML = '<div id="chat-container" class="chat-container"></div>';
    }

    function addContact() {
        const id = prompt("Введите ID друга:");
        const name = prompt("Имя контакта:");
        if (id && name) {
            friends.push({id, name});
            localStorage.setItem('koto_friends', JSON.stringify(friends));
            switchTab('contacts', document.querySelectorAll('.nav-item')[1]);
        }
    }

    function send() {
        const input = document.getElementById('message-input');
        if (!input.value) return;
        const msg = { type: 'text', text: input.value, senderId: myId, senderName: myName };
        if (currentTab === 'private') msg.targetId = privateTarget;
        ws.send(JSON.stringify(msg));
        input.value = '';
    }

    function renderMsg(data) {
        const container = document.getElementById('chat-container');
        if (!container) return;
        const div = document.createElement('div');
        const isOwn = data.senderId === myId;
        div.className = `msg ${isOwn ? 'out' : 'in'}`;
        div.innerHTML = `${!isOwn ? `<span class="sender-name">${data.senderName}</span>` : ''}${data.text}`;
        container.appendChild(div);
        document.getElementById('main-view').scrollTo(0, container.scrollHeight);
    }

    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
