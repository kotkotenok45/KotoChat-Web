<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --border: #38383a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        header { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; justify-content: space-between; flex-shrink: 0; }
        #view-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        
        .nav-bar { height: 65px; background: var(--panel); display: flex; border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8e8e93; position: relative; }
        .nav-item.active { color: var(--accent); }

        .list-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid var(--border); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }

        .chat-container { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 16px; animation: pop 0.2s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .msg.in { align-self: flex-start; background: #262629; }
        .msg.out { align-self: flex-end; background: var(--accent); }

        #input-area { padding: 10px; background: var(--panel); display: none; gap: 10px; border-top: 1px solid var(--border); }
        #message-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 20px; }

        /* ЗВОНКИ */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .video-box { width: 100%; height: 100%; position: absolute; object-fit: cover; }
        #local-video { width: 100px; height: 150px; position: absolute; top: 20px; right: 20px; border-radius: 10px; border: 2px solid #fff; z-index: 10; display: none; }
        .call-ui { z-index: 20; text-align: center; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 25px; margin: 20px; color: #fff; cursor: pointer; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; width: 85%; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; }
        button { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2>KotoChat</h2>
        <input type="text" id="reg-id" placeholder="ID">
        <input type="text" id="reg-name" placeholder="Имя (для новых)" style="display:none">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="handleAuth()" style="width:100%">Войти</button>
        <p onclick="toggleAuth()" style="font-size:12px; color:var(--accent); margin-top:15px;">Создать аккаунт</p>
    </div>
</div>

<div id="call-screen">
    <video id="remote-video" class="video-box" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-ui">
        <div class="avatar" id="call-avatar" style="width:100px; height:100px; font-size:40px; margin: 0 auto 20px;">?</div>
        <h2 id="call-user-name">Имя</h2>
        <p id="call-status">Вызов...</p>
        <div style="display:flex; justify-content:center;">
            <button class="btn-call" style="background:#ff3b30" onclick="endCall()">✕</button>
            <button class="btn-call" id="ans-btn" style="background:#32d74b; display:none" onclick="answerCall()">✔</button>
        </div>
    </div>
</div>

<header>
    <div id="back-btn" style="display:none" onclick="showTab('dialogs')">←</div>
    <div id="header-title">KotoChat</div>
    <div id="call-btns" style="display:none; gap:15px">
        <span onclick="startCall('audio')">📞</span>
        <span onclick="startCall('video')">📹</span>
    </div>
</header>

<div id="view-content"></div>

<div id="input-area">
    <input type="text" id="message-input" placeholder="Сообщение...">
    <button onclick="sendMsg()">></button>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showTab('dialogs')"><span>💬</span>Диалоги</div>
    <div class="nav-item" onclick="showTab('profile')"><span>👤</span>Профиль</div>
</nav>

<script>
    let ws, myId = localStorage.getItem('k_id'), myPass = localStorage.getItem('k_p'), myName;
    let currentChat, isReg = false, peer, localStream, targetIdForCall;

    function connect() {
        ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
        ws.onopen = () => { if(myId && myPass) handleAuth(true); };
        ws.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            if(data.type === 'auth_success') {
                myId = data.userId; myName = data.name;
                localStorage.setItem('k_id', myId); localStorage.setItem('k_p', myPass);
                document.getElementById('auth-screen').style.display = 'none';
                showTab('dialogs');
            }
            if(data.type === 'user_sync') renderList(data);
            if(data.type === 'history') { 
                document.getElementById('view-content').innerHTML = '<div id="chat-box" class="chat-container"></div>';
                data.messages.forEach(renderMsg); scrollToBottom();
            }
            if(data.type === 'text' && data.chatId === currentChat) { renderMsg(data); scrollToBottom(); }
            
            // ЛОГИКА ЗВОНКА
            if(data.type === 'call_user') {
                targetIdForCall = data.fromId;
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('call-user-name').textContent = data.fromName;
                document.getElementById('ans-btn').style.display = 'block';
                document.getElementById('call-status').textContent = data.callType === 'video' ? 'Видеозвонок...' : 'Аудиозвонок...';
            }
            if(data.type === 'reject_call') endCall();
        };
    }
    connect();

    function showTab(t) {
        currentChat = null;
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('call-btns').style.display = 'none';
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('header-title').textContent = t === 'dialogs' ? 'Диалоги' : 'Профиль';
        
        if(t === 'dialogs') ws.send(JSON.stringify({type:'login', userId:myId, password:myPass}));
        else document.getElementById('view-content').innerHTML = `<div style="text-align:center; padding:40px;"><h2>${myName}</h2><p>ID: ${myId}</p><button onclick="localStorage.clear(); location.reload()">Выйти</button></div>`;
    }

    function renderList(data) {
        let h = `<div style="padding:10px;"><input id="si" placeholder="Найти ID..."><button onclick="ws.send(JSON.stringify({type:'search_user',targetId:document.getElementById('si').value}))">Поиск</button></div>`;
        h += `<div class="list-item" onclick="openChat('global', 'Общий чат')"><div class="avatar">🌍</div><b>Общий чат</b></div>`;
        data.friends.forEach(f => {
            h += `<div class="list-item" onclick="openChat('${[myId, f.id].sort().join('_')}', '${f.name}')"><div class="avatar">${f.name[0]}</div><b>${f.name}</b></div>`;
        });
        document.getElementById('view-content').innerHTML = h;
    }

    function openChat(id, name) {
        currentChat = id;
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('header-title').textContent = name;
        document.getElementById('input-area').style.display = 'flex';
        if(id !== 'global') document.getElementById('call-btns').style.display = 'flex';
        ws.send(JSON.stringify({type:'get_history', chatId:id}));
    }

    async function startCall(type) {
        const tid = currentChat.replace(myId,'').replace('_','');
        targetIdForCall = tid;
        document.getElementById('call-screen').style.display = 'flex';
        ws.send(JSON.stringify({type:'call_user', targetId:tid, callType:type, fromName:myName}));
        
        if(type === 'video') {
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('local-video').style.display = 'block';
            document.getElementById('local-video').srcObject = localStream;
        }
    }

    function endCall() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('call-screen').style.display = 'none';
        ws.send(JSON.stringify({type:'reject_call', targetId:targetIdForCall}));
    }

    function handleAuth(auto = false) {
        const id = auto ? myId : document.getElementById('reg-id').value;
        const pass = auto ? myPass : document.getElementById('reg-pass').value;
        myPass = pass;
        ws.send(JSON.stringify({type: isReg?'register':'login', userId:id, password:pass, name: document.getElementById('reg-name').value || id}));
    }

    function renderMsg(m) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${m.senderId === myId ? 'out' : 'in'}`;
        d.innerHTML = `<small style="font-size:10px; opacity:0.7">${m.senderName}</small><br>${m.text}`;
        b.appendChild(d);
    }

    function sendMsg() {
        const i = document.getElementById('message-input');
        if(!i.value) return;
        ws.send(JSON.stringify({type:'text', chatId:currentChat, text:i.value, senderId:myId, senderName:myName}));
        i.value = '';
    }

    function toggleAuth() { isReg = !isReg; document.getElementById('reg-name').style.display = isReg?'block':'none'; }
    function scrollToBottom() { const v = document.getElementById('view-content'); v.scrollTop = v.scrollHeight; }
</script>
</body>
</html>
