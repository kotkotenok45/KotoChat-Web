<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotochat</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #2962ff; --text: #f0f0f0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        #status-dot { width: 10px; height: 10px; background: #555; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #00c853 !important; box-shadow: 0 0 5px #00c853; }
        #server-config { padding: 10px 20px; background: #0f0f0f; border-bottom: 1px solid #222; display: flex; gap: 10px; }
        input, button { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 2px; outline: none; transition: 0.2s; }
        button:hover { background: var(--accent); border-color: var(--accent); cursor: pointer; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: var(--panel); padding: 12px; border-radius: 2px; max-width: 85%; font-size: 14px; border-left: 2px solid #333; }
        .msg.own { align-self: flex-end; border-left: 0; border-right: 2px solid var(--accent); background: #1a1a1a; }
        #video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #000; height: 200px; }
        video { width: 100%; height: 100%; object-fit: cover; background: #050505; }
        #input-area { padding: 20px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #222; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<header>
    <div><span id="status-dot"></span><strong>KOTOCHAT</strong></div>
    <button id="call-btn">ВЫЗОВ</button>
</header>
<div id="server-config">
    <input type="text" id="server-url" style="flex: 1" placeholder="wss://адрес-сервера">
    <button onclick="connect()">ПОДКЛЮЧИТЬ</button>
</div>
<div id="video-grid" class="hidden">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
</div>
<div id="chat-area"></div>
<div id="input-area">
    <input type="text" id="message-input" style="flex: 1" placeholder="Сообщение...">
    <button id="send-btn">ОТПРАВИТЬ</button>
</div>
<script>
    let ws, localStream, peerConn;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    function connect() {
        const url = document.getElementById('server-url').value;
        if (!url) return;
        ws = new WebSocket(url);
        ws.onopen = () => document.getElementById('status-dot').classList.add('online');
        ws.onclose = () => document.getElementById('status-dot').classList.remove('online');
        ws.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'text') renderMsg(data.text, false);
            if (data.type === 'offer') handleOffer(data.offer);
            if (data.type === 'answer') await peerConn.setRemoteDescription(new RTCSessionDescription(data.answer));
            if (data.type === 'candidate') await peerConn.addIceCandidate(new RTCIceCandidate(data.candidate));
        };
    }

    function renderMsg(text, isOwn) {
        const div = document.createElement('div');
        div.className = `msg ${isOwn ? 'own' : ''}`;
        div.textContent = text;
        document.getElementById('chat-area').appendChild(div);
        document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const text = document.getElementById('message-input').value;
        if (!text || !ws) return;
        ws.send(JSON.stringify({ type: 'text', text }));
        renderMsg(text, true);
        document.getElementById('message-input').value = '';
    };

    document.getElementById('call-btn').onclick = async () => {
        document.getElementById('video-grid').classList.remove('hidden');
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        peerConn = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
        peerConn.onicecandidate = (e) => e.candidate && ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
        peerConn.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
        const offer = await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'offer', offer }));
    };

    async function handleOffer(offer) {
        document.getElementById('video-grid').classList.remove('hidden');
        peerConn = new RTCPeerConnection(rtcConfig);
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
        peerConn.onicecandidate = (e) => e.candidate && ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
        peerConn.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
        await peerConn.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConn.createAnswer();
        await peerConn.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', answer }));
    }
</script>
</body>
</html>
