<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/512/512638.png">
    
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --text: #fff; --border: #38383a; --msg-in: #262629; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        header { padding: calc(env(safe-area-inset-top) + 10px) 20px 10px; background: var(--panel); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .status-dot { width: 10px; height: 10px; background: #32d74b; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #32d74b; }

        /* CHAT AREA */
        #main-view { flex: 1; overflow-y: auto; padding-bottom: 140px; scroll-behavior: smooth; background: #000; }
        .chat-container { display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        
        /* СООБЩЕНИЯ (ТОТ САМЫЙ СТИЛЬ) */
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 16px; line-height: 1.4; position: relative; animation: fadeIn 0.2s ease; }
        .msg.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .sender-info { font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.7; color: var(--accent); }
        .msg.out .sender-info { color: #fff; opacity: 0.9; }

        /* INPUT AREA */
        #input-area { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 65px); left: 0; right: 0; background: rgba(28,28,30,0.9); backdrop-filter: blur(15px); border-top: 0.5px solid var(--border); padding: 10px 15px; display: flex; gap: 10px; z-index: 200; }
        #message-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 18px; border-radius: 25px; font-size: 16px; }

        /* NAV MENU */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); height: calc(env(safe-area-inset-bottom) + 65px); z-index: 200; }
        .nav-item { color: #8e8e93; font-size: 10px; text-align: center; flex: 1; padding-top: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 22px; margin-bottom: 3px; }

        /* AUTH */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 25px; width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--border); }
        .auth-card input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px; }
        .auth-card button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom:20px">KotoChat</h2>
            <input type="text" id="reg-id" placeholder="ID пользователя">
            <input type="text" id="reg-name" placeholder="Имя (для новых)" style="display:none">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button onclick="handleAuth()" id="auth-btn">Войти</button>
            <p onclick="toggleMode()" id="auth-toggle" style="color:var(--accent); font-size:14px; cursor:pointer; margin-top:15px">Нет аккаунта? Создать</p>
        </div>
    </div>

    <header>
        <div><span class="status-dot"></span> <span id="header-user">Чат</span></div>
        <div style="font-size: 12px; opacity: 0.6;">Online</div>
    </header>

    <div id="main-view">
        <div id="chat-container" class="chat-container"></div>
    </div>

    <div id="input-area" class="hidden">
        <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
        <button onclick="send()" style="background:none; border:none; color:var(--accent); font-weight:bold; font-size:16px">ОТПР.</button>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('global', this)"><div class="nav-icon">💬</div>Чат</div>
        <div class="nav-item" onclick="switchTab('contacts', this)"><div class="nav-icon">👥</div>Друзья</div>
        <div class="nav-item" onclick="switchTab('settings', this)"><div class="nav-icon">⚙️</div>Настройки</div>
    </nav>

<script>
    const ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
    let myId, myName, isReg = false;

    // Авторизация
    function toggleMode() {
        isReg = !isReg;
        document.getElementById('auth-btn').textContent = isReg ? 'Зарегистрироваться' : 'Войти';
        document.getElementById('reg-name').style.display = isReg ? 'block' : 'none';
        document.getElementById('auth-toggle').textContent = isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать';
    }

    function handleAuth() {
        ws.send(JSON.stringify({
            type: isReg ? 'register' : 'login',
            userId: document.getElementById('reg-id').value,
            name: document.getElementById('reg-name').value || 'User',
            password: document.getElementById('reg-pass').value
        }));
    }

    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        if (res.type === 'auth_success') {
            myId = res.userId; myName = res.name;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('header-user').textContent = myName;
        } else if (res.type === 'history') {
            document.getElementById('chat-container').innerHTML = '';
            res.messages.forEach(renderMsg);
        } else if (res.type === 'text') {
            renderMsg(res);
        } else if (res.type === 'error') alert(res.text);
    };

    function send() {
        const inp = document.getElementById('message-input');
        if (!inp.value) return;
        ws.send(JSON.stringify({ type: 'text', text: inp.value, senderId: myId, senderName: myName }));
        inp.value = '';
    }

    function renderMsg(msg) {
        const cont = document.getElementById('chat-container');
        const div = document.createElement('div');
        const isOwn = msg.senderId === myId;
        div.className = `msg ${isOwn ? 'out' : 'in'}`;
        div.innerHTML = `<div class="sender-info">${isOwn ? 'Вы' : msg.senderName}</div>${msg.text}`;
        cont.appendChild(div);
        document.getElementById('main-view').scrollTop = cont.scrollHeight;
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const view = document.getElementById('main-view');
        if (tab !== 'global') {
            document.getElementById('input-area').classList.add('hidden');
            view.innerHTML = `<div style="padding:60px; text-align:center; opacity:0.5">Раздел ${tab} в разработке</div>`;
        } else {
            document.getElementById('input-area').classList.remove('hidden');
            view.innerHTML = '<div id="chat-container" class="chat-container"></div>';
            ws.send(JSON.stringify({ type: 'login', userId: myId, password: "" }));
        }
    }

    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') send() };
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
