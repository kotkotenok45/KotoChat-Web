<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KotoChat</title>
    <meta name="theme-color" content="#020617">
    <style>
        :root {
            --bg-main: #020617;
            --bg-side: #0f172a;
            --accent: #3b82f6;
            --text-primary: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #1e293b;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 300px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            transition: 0.3s;
        }

        .status-online { 
            background: var(--success); 
            box-shadow: 0 0 10px var(--success); 
        }

        .channel-list {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .channel-item {
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .channel-item:hover { background: var(--border); }
        .active-ch { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

        #chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat-header {
            padding: 15px 25px;
            background: var(--bg-side);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #video-area {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 15px;
            background: #000;
        }

        video { 
            width: 100%; 
            border-radius: 4px; 
            background: #111;
            transform: scaleX(-1);
        }

        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-box {
            background: var(--bg-side);
            padding: 14px;
            border-radius: 4px;
            max-width: 75%;
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .input-area {
            padding: 25px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
            background: var(--bg-main);
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 4px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-call { background: var(--success); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="icon.png" width="28" height="28" alt="K">
            <span style="font-weight:900; letter-spacing:1px;">KotoChat</span>
        </div>
        <div id="ind" class="status-indicator"></div>
    </div>
    <div class="channel-list" id="ch-list">
        <div class="channel-item active-ch" id="default-ch" onclick="switchChannel('MAIN')"># MAIN</div>
    </div>
    <div style="padding:15px;">
        <button onclick="addChannel()" style="width:100%; background:transparent; border:1px solid var(--border);">+ СОЗДАТЬ СЕРВЕР</button>
    </div>
</div>

<div id="chat-window">
    <div id="chat-header">
        <span id="title" style="font-weight:800; letter-spacing:1px;">СЕРВЕР: MAIN</span>
        <button class="btn-call" id="call-btn" onclick="toggleVideo()">ЗВОНОК</button>
    </div>
    <div id="video-area"></div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="minput" placeholder="Введите сообщение...">
        <button onclick="sendMsg()">ОТПРАВИТЬ</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let peer;
    let currentRoom = 'MAIN';
    const serverHost = 'kotkotenok43-kotochat-server.hf.space';
    const indicator = document.getElementById('ind');

    function initKotoChat() {
        const userId = 'koto-' + Math.random().toString(36).substr(2, 6);
        
        peer = new Peer(userId, {
            host: serverHost,
            port: 443,
            path: '/myapp',
            secure: true
        });

        peer.on('open', () => {
            indicator.classList.add('status-online');
        });

        peer.on('error', (err) => {
            console.error(err);
            indicator.classList.remove('status-online');
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.room === currentRoom) {
                    renderMessage(data.user, data.msg);
                }
            });
        });

        peer.on('call', (call) => {
            if(confirm("Входящий звонок в KotoChat. Принять?")) {
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    document.getElementById('video-area').style.display = 'grid';
                    call.answer(stream);
                    setupVideo(call);
                });
            }
        });
    }

    function sendMsg() {
        const input = document.getElementById('minput');
        if(!input.value) return;
        
        renderMessage('ВЫ', input.value);
        
        const payload = { 
            room: currentRoom, 
            user: peer.id.split('-')[1], 
            msg: input.value 
        };

        Object.values(peer.connections).forEach(conns => {
            conns.forEach(c => c.send(payload));
        });
        
        input.value = '';
    }

    function renderMessage(user, text) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'msg-box';
        div.innerHTML = `<small style="color:var(--accent); font-weight:bold;">${user.toUpperCase()}</small><div style="margin-top:4px;">${text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addChannel() {
        const name = prompt("Название нового сервера:");
        if(name) {
            const list = document.getElementById('ch-list');
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerText = `# ${name.toUpperCase()}`;
            div.onclick = () => switchChannel(name);
            list.appendChild(div);
            switchChannel(name);
        }
    }

    function switchChannel(name) {
        currentRoom = name;
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active-ch'));
        document.getElementById('title').innerText = `СЕРВЕР: ${name.toUpperCase()}`;
        document.getElementById('messages').innerHTML = '';
        
        const target = prompt("Чтобы подключиться к участнику на этом сервере, введите его позывной (ID):");
        if(target) {
            peer.connect(target);
        }
    }

    async function toggleVideo() {
        const area = document.getElementById('video-area');
        const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        area.style.display = 'grid';
        
        const localVid = document.createElement('video');
        localVid.srcObject = stream;
        localVid.muted = true;
        localVid.play();
        area.appendChild(localVid);

        const target = prompt("Кому позвонить? (Введите ID участника)");
        if(target) {
            const call = peer.call(target, stream);
            setupVideo(call);
        }
    }

    function setupVideo(call) {
        call.on('stream', remoteStream => {
            const area = document.getElementById('video-area');
            const remoteVid = document.createElement('video');
            remoteVid.srcObject = remoteStream;
            remoteVid.play();
            area.appendChild(remoteVid);
        });
    }

    window.onload = initKotoChat;
</script>
</body>
</html>
