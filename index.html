<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kotochat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #2962ff; --text: #f0f0f0; --border: #222; --msg-in: #1e1e1e; --msg-out: #2962ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }

        /* Экран входа */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #auth-screen input { width: 100%; max-width: 300px; margin-bottom: 15px; background: var(--panel); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; font-size: 16px; }

        /* Шапка */
        header { padding: 15px 20px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        #status-dot { width: 8px; height: 8px; background: #ff1744; border-radius: 50%; }
        .online { background: #00c853 !important; box-shadow: 0 0 8px #00c853; }

        /* Чат */
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 16px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; cursor: pointer; }
        .msg .sender { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.7; display: block; }
        .msg.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 4px; color: white; }
        .msg.private { border: 1px dashed #ffd600; }

        /* Видео */
        #video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #000; height: 200px; border-bottom: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; background: #050505; }

        /* Ввод */
        #input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        #target-badge { background: #ffd600; color: black; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; display: none; }
        input#message-input { background: #1a1a1a; border: none; color: white; padding: 12px; border-radius: 20px; flex: 1; font-size: 16px; }
        .btn-round { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>KOTOCHAT</h2>
    <p>Введите ваш никнейм</p>
    <input type="text" id="username-input" placeholder="Ваше имя...">
    <button class="btn-round" onclick="login()" style="width: auto; padding: 10px 30px; border-radius: 12px;">Войти</button>
</div>

<div class="app-container">
    <header>
        <div class="user-info">
            <span id="status-dot"></span>
            <strong id="my-name-display">Загрузка...</strong>
        </div>
        <button id="call-btn" style="background:none; border: 1px solid #444; color: white; padding: 5px 15px; border-radius: 8px;">Звонок</button>
    </header>

    <div id="video-grid" class="hidden">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="chat-area"></div>

    <div id="input-area">
        <span id="target-badge">ЛС</span>
        <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
        <button id="send-btn" class="btn-round">></button>
    </div>
</div>

<script>
    const SERVER_URL = 'wss://kotkotenok43-kotochat-server.hf.space';
    let ws, localStream, peerConn, myId, myName, targetId = null;

    // Авторизация
    function login() {
        const input = document.getElementById('username-input');
        if (!input.value) return;
        myName = input.value;
        myId = 'user_' + Math.random().toString(36).substr(2, 5);
        localStorage.setItem('koto_name', myName);
        localStorage.setItem('koto_id', myId);
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('my-name-display').textContent = myName;
        initWS();
    }

    // Восстановление сессии
    if (localStorage.getItem('koto_name')) {
        myName = localStorage.getItem('koto_name');
        myId = localStorage.getItem('koto_id');
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('my-name-display').textContent = myName;
        initWS();
    }

    function initWS() {
        ws = new WebSocket(SERVER_URL);
        ws.onopen = () => {
            document.getElementById('status-dot').classList.add('online');
            ws.send(JSON.stringify({ type: 'auth', userId: myId }));
        };
        ws.onclose = () => {
            document.getElementById('status-dot').classList.remove('online');
            setTimeout(initWS, 3000);
        };
        ws.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            
            if (data.type === 'history') {
                data.messages.forEach(m => renderMsg(m));
            } else if (data.type === 'text') {
                renderMsg(data);
            } else if (data.type === 'offer') {
                handleOffer(data);
            } else if (data.type === 'answer') {
                await peerConn.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConn.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        };
    }

    function renderMsg(data) {
        if (document.getElementById(data.msgId)) return;
        const isOwn = data.senderId === myId;
        const div = document.createElement('div');
        div.id = data.msgId || Math.random();
        div.className = `msg ${isOwn ? 'out' : 'in'} ${data.targetId ? 'private' : ''}`;
        
        div.innerHTML = `<span class="sender">${data.senderName || 'Аноним'}</span>${data.text}`;
        
        // Клик для ЛС
        div.onclick = () => {
            if (!isOwn) {
                targetId = data.senderId;
                document.getElementById('target-badge').style.display = 'block';
                document.getElementById('target-badge').textContent = 'ЛС: ' + data.senderName;
                document.getElementById('message-input').focus();
            } else {
                targetId = null;
                document.getElementById('target-badge').style.display = 'none';
            }
        };

        document.getElementById('chat-area').appendChild(div);
        document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('message-input');
        if (!input.value || !ws) return;

        const msgData = {
            type: 'text',
            text: input.value,
            senderId: myId,
            senderName: myName,
            targetId: targetId,
            msgId: Date.now()
        };

        ws.send(JSON.stringify(msgData));
        renderMsg(msgData); // Сразу отрисовываем у себя
        input.value = '';
        targetId = null; // Сбрасываем ЛС после отправки
        document.getElementById('target-badge').style.display = 'none';
    };

    // --- Логика звонков (WebRTC) ---
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    document.getElementById('call-btn').onclick = async () => {
        document.getElementById('video-grid').classList.remove('hidden');
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        
        peerConn = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
        
        peerConn.onicecandidate = (e) => e.candidate && ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate, targetId: targetId }));
        peerConn.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
        
        const offer = await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'offer', offer, targetId: targetId, senderName: myName }));
    };

    async function handleOffer(data) {
        document.getElementById('video-grid').classList.remove('hidden');
        peerConn = new RTCPeerConnection(rtcConfig);
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
        
        peerConn.onicecandidate = (e) => e.candidate && ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate, targetId: data.senderId }));
        peerConn.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
        
        await peerConn.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConn.createAnswer();
        await peerConn.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', answer, targetId: data.senderId }));
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
