<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotochat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <style>
        :root {
            --bg-main: #020617;
            --bg-side: #0f172a;
            --accent: #3b82f6;
            --text-primary: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s ease;
        }

        .status-online { background: var(--success); }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .item-card {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.03);
            transition: 0.2s;
        }

        .item-card:hover { background: rgba(255,255,255,0.1); }

        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #view-header {
            padding: 1rem 2rem;
            background: var(--bg-side);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        #video-container {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 10px;
            background: #000;
        }

        video {
            width: 100%;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        #messages-flow {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 8px;
            background: var(--bg-side);
            align-self: flex-start;
        }

        .controls {
            padding: 20px;
            background: var(--bg-main);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        input, select {
            background: #1e293b;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: var(--accent);
            color: white;
        }

        button.call-btn { background: var(--success); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="icon.png" width="24" height="24">
            <strong>KOTOCHAT</strong>
        </div>
        <div id="connection-indicator" class="status-dot"></div>
    </div>
    
    <div class="list-container">
        <input type="text" id="server-url" style="width:85%; margin-bottom:10px;" placeholder="wss://your-space.hf.space">
        <div id="groups-list">
            <div class="item-card" onclick="joinRoom('general')"># Общий канал</div>
        </div>
        <button onclick="createGroup()" style="margin-top:20px; width:100%;">+ Группа/Канал</button>
    </div>
</div>

<div id="main-chat">
    <div id="view-header">
        <h2 id="room-title">Выберите комнату</h2>
        <div class="call-actions">
            <button class="call-btn" onclick="initiateCall()">Звонок</button>
        </div>
    </div>

    <div id="video-container"></div>

    <div id="messages-flow"></div>

    <div class="controls">
        <input type="text" id="msg-input" style="flex:1" placeholder="Сообщение...">
        <button onclick="sendMsg()">Отправить</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let peer;
    let conn;
    let currentRoom = 'general';
    const indicator = document.getElementById('connection-indicator');

    function initPeer() {
        peer = new Peer('koto-' + Math.floor(Math.random() * 10000));
        
        peer.on('open', (id) => {
            indicator.classList.add('status-online');
            console.log('ID пользователя:', id);
        });

        peer.on('connection', (connection) => {
            connection.on('data', (data) => {
                renderMessage(data);
            });
        });

        peer.on('call', (call) => {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then((stream) => {
                call.answer(stream);
                handleStream(call);
            });
        });
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const data = { text: input.value, sender: peer.id };
        renderMessage(data);
        input.value = '';
    }

    function renderMessage(data) {
        const flow = document.getElementById('messages-flow');
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<small style="color:var(--accent)">${data.sender}</small><br>${data.text}`;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    async function initiateCall() {
        const videoGrid = document.getElementById('video-container');
        videoGrid.style.display = 'grid';
        const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        const localVid = document.createElement('video');
        localVid.srcObject = stream;
        localVid.muted = true;
        localVid.play();
        videoGrid.appendChild(localVid);
    }

    function createGroup() {
        const name = prompt("Название группы:");
        if (name) {
            const list = document.getElementById('groups-list');
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerText = `# ${name}`;
            div.onclick = () => joinRoom(name);
            list.appendChild(div);
        }
    }

    function joinRoom(room) {
        document.getElementById('room-title').innerText = room;
        document.getElementById('messages-flow').innerHTML = '';
        currentRoom = room;
    }

    function handleStream(call) {
        call.on('stream', (userStream) => {
            const videoGrid = document.getElementById('video-container');
            videoGrid.style.display = 'grid';
            const remoteVid = document.createElement('video');
            remoteVid.srcObject = userStream;
            remoteVid.play();
            videoGrid.appendChild(remoteVid);
        });
    }

    window.onload = initPeer;
</script>
</body>
</html>
