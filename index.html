<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kotochat</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Экран регистрации */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-card { background: var(--panel); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
        input { background: #2c2c2e; border: none; color: #fff; padding: 14px; border-radius: 12px; font-size: 16px; }
        button.primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; }

        /* Главный экран */
        header { padding: calc(env(safe-area-inset-top) + 10px) 20px 10px; background: var(--panel); border-bottom: 0.5px solid #38383a; font-weight: 600; }
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        
        /* СООБЩЕНИЯ */
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 16px; position: relative; }
        .msg.in { align-self: flex-start; background: #262629; }
        .msg.out { align-self: flex-end; background: var(--accent); }
        .sender-name { font-size: 10px; opacity: 0.6; margin-bottom: 2px; display: block; }

        /* ФИКС ПОЛЯ ВВОДА */
        .input-wrapper { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: var(--panel); 
            border-top: 0.5px solid #38383a; 
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 10px);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        #message-input { flex: 1; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin:0 0 10px 0">Kotochat</h2>
        <input type="text" id="reg-id" placeholder="Придумайте ID">
        <input type="text" id="reg-name" placeholder="Ваше имя">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button class="primary" onclick="auth('register')">Создать аккаунт</button>
        <button style="background:none; border:none; color:var(--accent); font-size:13px;" onclick="toggleAuth()">Уже есть аккаунт? Войти</button>
    </div>
</div>

<header id="chat-header">Чат</header>

<div id="chat-view"></div>

<div class="input-wrapper">
    <input type="text" id="message-input" placeholder="Сообщение" autocomplete="off">
    <button onclick="send()" style="background:none; border:none; color:var(--accent); font-weight:700; padding:0 10px;">ОТПР.</button>
</div>

<script>
    const ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
    let myId, myName;

    function auth(type) {
        const userId = document.getElementById('reg-id').value;
        const name = document.getElementById('reg-name').value;
        const password = document.getElementById('reg-pass').value;
        ws.send(JSON.stringify({ type, userId, name, password }));
    }

    function toggleAuth() {
        const btn = event.target;
        const nameInput = document.getElementById('reg-name');
        if(nameInput.style.display === 'none') {
            nameInput.style.display = 'block';
            btn.textContent = 'Уже есть аккаунт? Войти';
            document.querySelector('.primary').onclick = () => auth('register');
        } else {
            nameInput.style.display = 'none';
            btn.textContent = 'Новый пользователь? Регистрация';
            document.querySelector('.primary').onclick = () => auth('login');
        }
    }

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'auth_success') {
            myId = data.userId; myName = data.name;
            document.getElementById('auth-overlay').classList.add('hidden');
        }
        if (data.type === 'history') data.messages.forEach(renderMsg);
        if (data.type === 'text') renderMsg(data);
        if (data.type === 'error') alert(data.text);
    };

    function send() {
        const input = document.getElementById('message-input');
        if (!input.value) return;
        ws.send(JSON.stringify({ type: 'text', text: input.value, senderId: myId, senderName: myName }));
        input.value = '';
    }

    function renderMsg(data) {
        const view = document.getElementById('chat-view');
        const div = document.createElement('div');
        const isOwn = data.senderId === myId;
        div.className = `msg ${isOwn ? 'out' : 'in'}`;
        div.innerHTML = `<span class="sender-name">${data.senderName}</span>${data.text}`;
        view.appendChild(div);
        view.scrollTop = view.scrollHeight;
    }

    // Обработка Enter
    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
