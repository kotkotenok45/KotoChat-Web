<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/512/512638.png">
    <style>
        :root { --tg-bg: #0e1621; --tg-panel: #17212b; --tg-accent: #2b5278; --tg-blue: #2481cc; --tg-text: #ffffff; --tg-gray: #8b969f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--tg-bg); color: var(--tg-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Шапка в стиле ТГ */
        header { background: var(--tg-panel); height: 56px; display: flex; align-items: center; padding: 0 16px; gap: 20px; border-bottom: 1px solid #101921; z-index: 10; }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--tg-gray); }
        .header-title { font-size: 20px; font-weight: 500; flex: 1; }

        /* Список чатов */
        #chats-list { flex: 1; overflow-y: auto; display: block; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; gap: 15px; border-bottom: 1px solid #101921; cursor: pointer; }
        .chat-avatar { width: 54px; height: 54px; background: linear-gradient(135deg, #517da2, #295071); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .chat-info { flex: 1; border-bottom: 0.5px solid #101921; padding-bottom: 10px; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .chat-last-msg { color: var(--tg-gray); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Окно сообщений (скрыто по умолчанию) */
        #chat-window { position: fixed; inset: 0; background: #0e1621; z-index: 100; display: none; flex-direction: column; }
        .msg-container { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        .bubble { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 15px; position: relative; line-height: 1.4; color: #fff; }
        .bubble.in { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .bubble.out { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }

        /* Кнопка создания чата (как на скриншоте пользователя) */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--tg-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 50; }

        /* Поле ввода */
        .input-bar { background: var(--tg-panel); padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; background: none; border: none; color: white; font-size: 16px; padding: 10px; }

        #auth-screen { position: fixed; inset: 0; background: var(--tg-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--tg-panel); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; background: #242f3d; border: 1px solid #242f3d; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        button { width: 100%; background: var(--tg-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-top:0">KotoChat</h2>
            <input type="text" id="reg-id" placeholder="ID">
            <input type="text" id="reg-name" placeholder="Имя" style="display:none">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button onclick="handleAuth()" id="auth-btn">ВОЙТИ</button>
            <p onclick="toggleMode()" id="auth-toggle" style="color:var(--tg-blue); font-size:14px; cursor:pointer; margin-top:15px">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <div id="main-screen">
        <header>
            <div class="menu-icon">☰</div>
            <div class="header-title">KotoChat</div>
        </header>
        <div id="chats-list">
            <div class="chat-item" onclick="openChat('Global Chat')">
                <div class="chat-avatar">K</div>
                <div class="chat-info">
                    <div class="chat-name">Общий чат</div>
                    <div class="chat-last-msg">Нажмите, чтобы войти в переписку...</div>
                </div>
            </div>
        </div>
        <div class="fab" onclick="alert('Поиск контактов скоро!')">+</div>
    </div>

    <div id="chat-window">
        <header>
            <div class="menu-icon" onclick="closeChat()">←</div>
            <div class="header-title" id="chat-title">Чат</div>
        </header>
        <div id="msg-container" class="msg-container"></div>
        <div class="input-bar">
            <input type="text" id="message-input" placeholder="Сообщение...">
            <button onclick="send()" style="width:auto; background:none; color:var(--tg-blue)">ОТПР.</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
        let myId, myName, isReg = false;

        function toggleMode() {
            isReg = !isReg;
            document.getElementById('auth-btn').textContent = isReg ? 'СОЗДАТЬ АККАУНТ' : 'ВОЙТИ';
            document.getElementById('reg-name').style.display = isReg ? 'block' : 'none';
        }

        function handleAuth() {
            ws.send(JSON.stringify({
                type: isReg ? 'register' : 'login',
                userId: document.getElementById('reg-id').value,
                name: document.getElementById('reg-name').value || 'User',
                password: document.getElementById('reg-pass').value
            }));
        }

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === 'auth_success') {
                myId = res.userId; myName = res.name;
                document.getElementById('auth-screen').classList.add('hidden');
            } else if (res.type === 'history') {
                document.getElementById('msg-container').innerHTML = '';
                res.messages.forEach(renderMsg);
            } else if (res.type === 'text') {
                renderMsg(res);
            }
        };

        function openChat(name) {
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').textContent = name;
            ws.send(JSON.stringify({ type: 'login', userId: myId, password: "" })); 
        }

        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function send() {
            const inp = document.getElementById('message-input');
            if (!inp.value) return;
            ws.send(JSON.stringify({ type: 'text', text: inp.value, senderId: myId, senderName: myName }));
            inp.value = '';
        }

        function renderMsg(msg) {
            const cont = document.getElementById('msg-container');
            const div = document.createElement('div');
            const isOwn = msg.senderId === myId;
            div.className = `bubble ${isOwn ? 'out' : 'in'}`;
            div.innerHTML = `<span style="font-size:12px; color:var(--tg-blue); font-weight:bold">${msg.senderName}</span><br>${msg.text}`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
