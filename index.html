<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --border: #38383a; --msg-in: #262629; --text-gray: #8e8e93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        /* Шапка */
        header { padding-top: env(safe-area-inset-top); background: rgba(28,28,30,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 100; flex-shrink: 0; }
        .header-content { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .header-btn { width: 60px; color: var(--accent); font-size: 16px; font-weight: 500; cursor: pointer; }
        .header-title-box { text-align: center; flex: 1; }
        .header-title { font-weight: 600; font-size: 17px; }
        .header-subtitle { font-size: 11px; color: var(--text-gray); }

        /* Основной контент (скроллится только он) */
        #view-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); position: relative; }
        
        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-form { width: 85%; max-width: 340px; text-align: center; background: var(--panel); padding: 30px 20px; border-radius: 20px; }
        .auth-form input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; }
        .auth-form button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }

        /* Списки */
        .list-item { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; background: var(--bg); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #0a84ff, #005bb5); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; position: relative; flex-shrink: 0; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #32d74b; border: 2px solid var(--bg); border-radius: 50%; display: none; }

        /* Чат */
        .chat-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 16px; word-wrap: break-word; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .msg.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; color: white; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg audio { max-width: 200px; height: 35px; margin-top: 5px; }
        .msg-time { font-size: 10px; opacity: 0.7; display: block; text-align: right; margin-top: 4px; }

        /* Ввод сообщения */
        #input-area { background: var(--panel); padding: 10px 15px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); display: none; align-items: center; gap: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
        #message-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 20px; font-size: 16px; }
        .attach-btn { background: none; border: none; font-size: 24px; color: var(--text-gray); padding: 0; cursor: pointer; }
        .action-btn { background: var(--accent); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .recording { background: #ff3b30; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Нижняя навигация */
        nav { height: calc(55px + env(safe-area-inset-bottom)); background: var(--panel); display: flex; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-gray); cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        /* Звонки (UI) */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .video-container { flex: 1; position: relative; background: #1c1c1e; display: flex; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 110px; height: 160px; position: absolute; top: 20px; right: 20px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; z-index: 3001; }
        .call-controls { height: 140px; display: flex; justify-content: center; align-items: center; gap: 40px; padding-bottom: env(safe-area-inset-bottom); background: rgba(0,0,0,0.5); }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-form">
        <h1 id="auth-title" style="font-size: 28px; margin-bottom: 5px;">Вход</h1>
        <p style="color: var(--text-gray); margin-bottom: 20px;">KotoChat</p>
        
        <input type="text" id="auth-id" placeholder="Ваш ID (логин)">
        <input type="text" id="reg-name" placeholder="Ваше имя" style="display: none;">
        <input type="password" id="auth-pass" placeholder="Пароль">
        
        <button onclick="handleAuth()" id="auth-btn">Войти</button>
        <p id="toggle-link" style="color: var(--accent); margin-top: 20px; font-size: 14px; cursor: pointer;" onclick="toggleAuth()">Нет аккаунта? Создать</p>
    </div>
</div>

<div id="call-ui">
    <div class="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div id="call-info" style="position: absolute; top: 40px; text-align: center; width: 100%; z-index: 3002; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
            <h2 id="call-name" style="font-size: 30px; margin-bottom: 5px;">Имя</h2>
            <p id="call-status" style="font-size: 18px; color: #ddd;">Звонок...</p>
        </div>
    </div>
    <div class="call-controls">
        <button class="call-btn" style="background: #ff3b30;" onclick="endCall()">✕</button>
        <button id="btn-accept" class="call-btn" style="background: #32d74b; display: none;" onclick="acceptCall()">✔</button>
    </div>
</div>

<header>
    <div class="header-content">
        <div id="back-btn" class="header-btn" style="display: none;" onclick="showTab('dialogs')">◁ Назад</div>
        <div id="empty-left" class="header-btn"></div>
        
        <div class="header-title-box">
            <div id="header-title" class="header-title">Диалоги</div>
            <div id="header-status" class="header-subtitle"></div>
        </div>
        
        <div id="call-actions" class="header-btn" style="display: none; justify-content: flex-end; gap: 15px; font-size: 20px;">
            <span onclick="startCall('audio')">📞</span>
            <span onclick="startCall('video')">📹</span>
        </div>
        <div id="empty-right" class="header-btn"></div>
    </div>
</header>

<div id="view-content"></div>

<div id="input-area">
    <label class="attach-btn">
        📎 <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="sendImage(this)">
    </label>
    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off" oninput="updateInputIcon()">
    <button id="main-action-btn" class="action-btn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎤</button>
</div>

<nav id="bottom-nav">
    <div class="nav-item active" data-tab="dialogs" onclick="showTab('dialogs')"><span style="font-size: 22px; margin-bottom: 2px;">💬</span>Чаты</div>
    <div class="nav-item" data-tab="profile" onclick="showTab('profile')"><span style="font-size: 22px; margin-bottom: 2px;">⚙️</span>Настройки</div>
</nav>

<script>
    let ws;
    let isReg = false;
    let myId = localStorage.getItem('k_id'), myPass = localStorage.getItem('k_p'), myName = localStorage.getItem('k_n');
    let currentChat = null, onlineUsers = [], myFriends = [], myRequests = [];
    
    // Медиа и WebRTC
    let peer, localStream, activeCallerId = null, isCallVideo = false;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    let mediaRecorder, audioChunks = [];

    // --- АВТОРИЗАЦИЯ ---
    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('auth-title').innerText = isReg ? "Регистрация" : "Вход";
        document.getElementById('auth-btn').innerText = isReg ? "Создать аккаунт" : "Войти";
        document.getElementById('toggle-link').innerText = isReg ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Создать";
        document.getElementById('reg-name').style.display = isReg ? "block" : "none";
    }

    function handleAuth() {
        const id = document.getElementById('auth-id').value.trim();
        const pass = document.getElementById('auth-pass').value;
        const name = document.getElementById('reg-name').value.trim();

        if (!id || !pass) return alert("Введите ID и пароль!");
        
        ws.send(JSON.stringify({
            type: isReg ? 'register' : 'login',
            userId: id, password: pass, name: isReg ? name : undefined
        }));
        
        localStorage.setItem('k_p', pass); // Сохраняем пароль временно до успеха
    }

    // --- ВЕБСОКЕТЫ ---
    function connect() {
        ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
        
        ws.onopen = () => {
            if (myId && myPass) ws.send(JSON.stringify({type: 'login', userId: myId, password: myPass}));
        };

        ws.onmessage = async (e) => {
            const res = JSON.parse(e.data);
            
            if (res.type === 'auth_success') {
                myId = res.userId; myName = res.name;
                localStorage.setItem('k_id', myId); localStorage.setItem('k_n', myName);
                document.getElementById('auth-screen').style.display = 'none';
                showTab('dialogs');
            }
            if (res.type === 'error') {
                alert(res.text);
                if (res.text.includes("логин") || res.text.includes("входа")) { localStorage.clear(); document.getElementById('auth-screen').style.display = 'flex'; }
            }
            if (res.type === 'user_sync') { myFriends = res.friends; myRequests = res.requests; if(!currentChat && document.getElementById('header-title').innerText === 'Диалоги') renderDialogs(); }
            if (res.type === 'online_statuses') { onlineUsers = res.onlineIds; if(!currentChat) renderDialogs(); updateChatHeader(); }
            if (res.type === 'search_result') handleSearch(res);
            if (res.type === 'history') { 
                const c = document.getElementById('chat-container'); 
                if (c) { c.innerHTML = ''; res.messages.forEach(renderMsg); scrollToBottom(); }
            }
            if (['text', 'image', 'audio'].includes(res.type) && res.chatId === currentChat) {
                renderMsg(res); scrollToBottom();
            }
            if (res.type === 'typing' && currentChat && res.fromId === currentChat.replace(myId, '').replace('_', '')) {
                document.getElementById('header-status').innerText = 'печатает...';
                clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(updateChatHeader, 2000);
            }

            // WebRTC Call Handling
            if (res.type === 'call_user') {
                activeCallerId = res.fromId;
                isCallVideo = res.isVideo;
                document.getElementById('call-ui').style.display = 'flex';
                document.getElementById('call-name').innerText = res.fromName;
                document.getElementById('call-status').innerText = isCallVideo ? 'Входящий видеозвонок...' : 'Входящий аудиозвонок...';
                document.getElementById('btn-accept').style.display = 'flex';
                document.getElementById('local-video').style.display = 'none'; // Скрыто до принятия
                document.getElementById('remote-video').style.display = 'none';
            }
            if (res.type === 'webrtc_signal') {
                if (!peer) initPeer(res.fromId);
                if (res.signal.ice) await peer.addIceCandidate(res.signal.ice);
                else {
                    await peer.setRemoteDescription(new RTCSessionDescription(res.signal));
                    if (res.signal.type === 'offer') {
                        const ans = await peer.createAnswer();
                        await peer.setLocalDescription(ans);
                        ws.send(JSON.stringify({type: 'webrtc_signal', targetId: res.fromId, signal: ans}));
                    }
                }
            }
            if (res.type === 'accept_call') {
                document.getElementById('call-status').innerText = 'Соединение...';
            }
            if (res.type === 'reject_call' || res.type === 'call_cancelled') endCall();
        };

        ws.onclose = () => setTimeout(connect, 2000);
    }

    // --- НАВИГАЦИЯ ---
    function showTab(tab) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.tab === tab));
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('bottom-nav').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('empty-left').style.display = 'block';
        document.getElementById('call-actions').style.display = 'none';
        document.getElementById('empty-right').style.display = 'block';
        document.getElementById('header-status').innerText = '';
        currentChat = null;

        if (tab === 'dialogs') {
            document.getElementById('header-title').innerText = 'Диалоги';
            renderDialogs();
        } else {
            document.getElementById('header-title').innerText = 'Настройки';
            document.getElementById('view-content').innerHTML = `
                <div style="padding: 40px 20px; text-align: center;">
                    <div class="avatar" style="margin: 0 auto 20px; width: 100px; height: 100px; font-size: 40px;">${myName ? myName[0] : '?'}</div>
                    <h2 style="margin-bottom: 5px;">${myName}</h2>
                    <p style="color: var(--text-gray);">ID: ${myId}</p>
                    <button onclick="localStorage.clear(); location.reload();" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ff3b30; background: transparent; color: #ff3b30; font-size: 16px; margin-top: 40px; cursor: pointer;">Выйти из аккаунта</button>
                </div>`;
        }
    }

    function renderDialogs() {
        let html = `
            <div style="padding: 15px;">
                <input type="text" placeholder="Найти по ID..." onchange="ws.send(JSON.stringify({type:'search_user', targetId: this.value}))" style="width: 100%; background: var(--panel); border: none; color: #fff; padding: 12px 15px; border-radius: 12px; font-size: 16px;">
                <div id="search-box"></div>
            </div>`;
        
        myRequests.forEach(r => { 
            html += `<div class="list-item"><div class="avatar">${r.name[0]}</div><div style="flex:1"><b>${r.name}</b><br><small>Хочет добавить вас</small></div><button onclick="ws.send(JSON.stringify({type:'accept_request', targetId:'${r.id}'}))" style="background:#32d74b; border:none; color:#fff; padding:8px 15px; border-radius:10px;">Принять</button></div>`; 
        });
        
        html += `<div class="list-item" onclick="openChat('global', 'Общий чат')"><div class="avatar">🌍</div><div style="flex:1"><b>Общий чат</b></div></div>`;
        
        myFriends.forEach(f => {
            const isOnline = onlineUsers.includes(f.id);
            html += `
            <div class="list-item" onclick="openChat('${[myId, f.id].sort().join('_')}', '${f.name}', '${f.id}')">
                <div class="avatar">${f.name[0]}<div class="online-dot" style="display:${isOnline?'block':'none'}"></div></div>
                <div><b>${f.name}</b><br><span style="font-size:13px; color:var(--text-gray)">${isOnline ? 'в сети' : 'был(а) недавно'}</span></div>
            </div>`;
        });
        document.getElementById('view-content').innerHTML = html;
    }

    function handleSearch(res) {
        const b = document.getElementById('search-box');
        b.innerHTML = res.found ? `<div class="list-item" style="background:#2c2c2e; border-radius:12px; margin-top:10px;"><div class="avatar">${res.targetName[0]}</div><div style="flex:1"><b>${res.targetName}</b></div><button onclick="ws.send(JSON.stringify({type:'send_request', targetId:'${res.targetId}'}))" style="background:var(--accent); border:none; color:#fff; padding:8px 15px; border-radius:10px;">Добавить</button></div>` : '<p style="color:#ff3b30; text-align:center; padding-top:10px;">Пользователь не найден</p>';
    }

    // --- ЧАТ ---
    function openChat(chatId, name, targetUserId = null) {
        currentChat = chatId;
        document.getElementById('header-title').innerText = name;
        
        // Переключаем шапку и подвал
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('input-area').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('empty-left').style.display = 'none';
        
        if (targetUserId) {
            document.getElementById('call-actions').style.display = 'flex';
            document.getElementById('empty-right').style.display = 'none';
            document.getElementById('call-actions').dataset.target = targetUserId;
        } else {
            document.getElementById('call-actions').style.display = 'none';
            document.getElementById('empty-right').style.display = 'block';
        }
        
        document.getElementById('view-content').innerHTML = '<div id="chat-container" class="chat-container"></div>';
        updateChatHeader();
        ws.send(JSON.stringify({type: 'get_history', chatId: id = currentChat}));
    }

    function updateChatHeader() {
        if (!currentChat || currentChat === 'global') return;
        const targetId = currentChat.replace(myId, '').replace('_', '');
        const isOnline = onlineUsers.includes(targetId);
        const st
