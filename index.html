<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1c1c1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --border: #38383a; --msg-in: #262629; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(10,132,255,0.4); } 70% { box-shadow: 0 0 0 20px rgba(10,132,255,0); } 100% { box-shadow: 0 0 0 0 rgba(10,132,255,0); } }

        header { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); justify-content: space-between; z-index: 10; }
        #view-content { flex: 1; overflow-y: auto; scroll-behavior: smooth; background: var(--bg); }
        
        .nav-bar { height: 65px; background: var(--panel); display: flex; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8e8e93; cursor: pointer; position: relative; }
        .nav-item.active { color: var(--accent); }

        .chat-container { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 16px; animation: slideUp 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .msg.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        
        .list-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid var(--border); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }

        #input-area { padding: 10px 15px; background: var(--panel); display: none; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        #message-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 20px; font-size: 16px; }

        /* Звонки и Видео */
        #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.3s; }
        #video-wrap { display: none; position: fixed; inset: 0; background: #000; z-index: 1001; flex-direction: column; }
        .remote-v { flex: 1; width: 100%; height: 100%; object-fit: cover; }
        .local-v { width: 100px; height: 150px; position: absolute; top: 20px; right: 20px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; transform: scaleX(-1); }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 24px; color: #fff; display: flex; align-items: center; justify-content: center; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; }
        .badge { position: absolute; top: 8px; right: 25%; background: #ff3b30; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2>KotoChat</h2>
        <input type="text" id="reg-id" placeholder="ID (логин)">
        <input type="text" id="reg-name" placeholder="Ваше имя" style="display:none">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="handleAuth()" id="auth-btn" style="width:100%; padding:14px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-weight:bold;">Войти</button>
        <p onclick="toggleAuth()" id="auth-link" style="color:var(--accent); margin-top:15px; cursor:pointer;">Создать аккаунт</p>
    </div>
</div>

<div id="call-overlay">
    <div style="width:100px; height:100px; background:var(--accent); border-radius:50%; animation: pulse 1.5s infinite; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:20px;">📞</div>
    <h2 id="caller-name">Имя...</h2>
    <p id="call-status">Звонок...</p>
    <div style="display:flex; gap:40px; margin-top:40px;">
        <button class="c-btn" style="background:#ff3b30;" onclick="endCall()">✕</button>
        <button class="c-btn" id="answer-btn" style="background:#32d74b;" onclick="acceptCall()">✔</button>
    </div>
</div>

<div id="video-wrap">
    <video id="remote-v" class="remote-v" autoplay playsinline></video>
    <video id="local-v" class="local-v" autoplay playsinline muted></video>
    <div style="position:absolute; bottom:50px; width:100%; display:flex; justify-content:center;">
        <button class="c-btn" style="background:#ff3b30;" onclick="endCall()">✕</button>
    </div>
</div>

<header>
    <div id="back-btn" style="display:none; color:var(--accent); font-weight:bold;" onclick="showTab('dialogs')">← Назад</div>
    <div id="header-title" style="font-weight:bold;">KotoChat</div>
    <div id="call-actions" style="display:none; gap:20px;">
        <span onclick="makeCall('audio')" style="font-size:22px;">📞</span>
        <span onclick="makeCall('video')" style="font-size:22px;">📹</span>
    </div>
</header>

<div id="view-content"></div>

<div id="input-area">
    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
    <button onclick="sendMsg()" style="background:none; border:none; color:var(--accent); font-weight:bold;">ОТПР.</button>
</div>

<nav class="nav-bar">
    <div class="nav-item active" data-tab="dialogs" onclick="showTab('dialogs')">💬 Диалоги<div id="badge" class="badge" style="display:none;">0</div></div>
    <div class="nav-item" data-tab="profile" onclick="showTab('profile')">👤 Профиль</div>
</nav>

<script>
    let ws, peer, localStream;
    let myId = localStorage.getItem('k_id'), myName = localStorage.getItem('k_n'), myPass = localStorage.getItem('k_p');
    let currentChat = null, isReg = false, myFriends = [], myRequests = [], activeCallerId = null;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function connect() {
        ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
        ws.onopen = () => { if(myId && myPass) ws.send(JSON.stringify({type:'login', userId:myId, password:myPass})); };
        ws.onmessage = async (e) => {
            const res = JSON.parse(e.data);
            if(res.type === 'auth_success') {
                myId = res.userId; myName = res.name;
                localStorage.setItem('k_id', myId); localStorage.setItem('k_n', myName);
                document.getElementById('auth-screen').style.display = 'none';
                showTab('dialogs');
            }
            if(res.type === 'user_sync') { myFriends = res.friends; myRequests = res.requests; updateBadge(); if(!currentChat) renderDialogs(); }
            if(res.type === 'history' && document.getElementById('chat-container')) { res.messages.forEach(renderMsg); scrollToBottom(); }
            if(res.type === 'text' && res.chatId === currentChat) { renderMsg(res); scrollToBottom(); }
            
            // WebRTC Логика
            if(res.type === 'call_user') {
                activeCallerId = res.fromId;
                document.getElementById('call-overlay').style.display = 'flex';
                document.getElementById('caller-name').textContent = res.fromName;
                document.getElementById('answer-btn').style.display = 'flex';
            }
            if(res.type === 'webrtc_signal') {
                if(!peer) initPeer(res.fromId);
                if(res.signal.ice) await peer.addIceCandidate(res.signal.ice);
                else {
                    await peer.setRemoteDescription(new RTCSessionDescription(res.signal));
                    if(res.signal.type === 'offer') {
                        const ans = await peer.createAnswer();
                        await peer.setLocalDescription(ans);
                        ws.send(JSON.stringify({type:'webrtc_signal', targetId:res.fromId, signal:ans}));
                    }
                }
            }
            if(res.type === 'call_cancelled' || res.type === 'reject_call') endCall();
            if(res.type === 'search_result') handleSearch(res);
        };
        ws.onclose = () => setTimeout(connect, 2000);
    }
    connect();

    async function makeCall(type) {
        activeCallerId = currentChat.replace(myId, '').replace('_', '');
        document.getElementById('call-overlay').style.display = 'flex';
        document.getElementById('caller-name').textContent = "Вызов...";
        document.getElementById('answer-btn').style.display = 'none';
        
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:type==='video'});
        if(type==='video') { document.getElementById('video-wrap').style.display='flex'; document.getElementById('local-v').srcObject=localStream; }
        
        initPeer(activeCallerId);
        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);
        ws.send(JSON.stringify({type:'call_user', targetId:activeCallerId, callType:type}));
        ws.send(JSON.stringify({type:'webrtc_signal', targetId:activeCallerId, signal:offer}));
    }

    async function acceptCall() {
        document.getElementById('call-overlay').style.display = 'none';
        document.getElementById('video-wrap').style.display = 'flex';
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
        document.getElementById('local-v').srcObject = localStream;
        ws.send(JSON.stringify({type:'accept_call', targetId:activeCallerId}));
    }

    function initPeer(tid) {
        peer = new RTCPeerConnection(rtcConfig);
        localStream?.getTracks().forEach(t => peer.addTrack(t, localStream));
        peer.ontrack = (e) => document.getElementById('remote-v').srcObject = e.streams[0];
        peer.onicecandidate = (e) => { if(e.candidate) ws.send(JSON.stringify({type:'webrtc_signal', targetId:tid, signal:{ice:e.candidate}})); };
    }

    function endCall() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        if(peer) peer.close(); peer = null;
        document.getElementById('call-overlay').style.display = 'none';
        document.getElementById('video-wrap').style.display = 'none';
        if(activeCallerId) ws.send(JSON.stringify({type:'reject_call', targetId:activeCallerId}));
    }

    function showTab(t) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.tab === t));
        const cont = document.getElementById('view-content');
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('call-actions').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        if(t === 'dialogs') { currentChat = null; document.getElementById('header-title').textContent = 'Диалоги'; renderDialogs(); }
        else { document.getElementById('header-title').textContent = 'Профиль'; cont.innerHTML = `<div style="padding:40px; text-align:center;"><div class="avatar" style="margin:0 auto 20px; width:80px; height:80px;">${myName[0]}</div><h2>${myName}</h2><button onclick="logout()" style="background:#ff3b30; color:#fff; border:none; padding:12px; border-radius:12px; width:100%; margin-top:20px;">ВЫЙТИ</button></div>`; }
    }

    function renderDialogs() {
        let h = `<div style="padding:15px;"><div style="display:flex; gap:10px;"><input id="f-id" placeholder="ID..." style="flex:1; background:#1c1c1e; border:1px solid #38383a; color:#fff; padding:12px; border-radius:12px;"><button onclick="ws.send(JSON.stringify({type:'search_user', targetId:document.getElementById('f-id').value}))" style="background:var(--accent); border:none; border-radius:12px; color:#fff; padding:0 15px;">Найти</button></div><div id="s-res"></div></div>`;
        myRequests.forEach(r => { h += `<div class="list-item"><div class="avatar">${r.name[0]}</div><div style="flex:1">${r.name}</div><button onclick="ws.send(JSON.stringify({type:'accept_request', targetId:'${r.id}'}))" style="background:#32d74b; border:none; color:#fff; padding:8px 12px; border-radius:10px;">Принять</button></div>`; });
        h += `<div class="list-item" onclick="openChat('global', 'Общий чат')"><div class="avatar">🌍</div><div><b>Общий чат</b></div></div>`;
        myFriends.forEach(f => { h += `<div class="list-item" onclick="openChat('${[myId, f.id].sort().join('_')}', '${f.name}')"><div class="avatar">${f.name[0]}</div><div><b>${f.name}</b></div></div>`; });
        document.getElementById('view-content').innerHTML = h;
    }

    function openChat(id, name) {
        currentChat = id;
        document.getElementById('header-title').textContent = name;
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('input-area').style.display = 'flex';
        document.getElementById('call-actions').style.display = id==='global'?'none':'flex';
        document.getElementById('view-content').innerHTML = '<div id="chat-container" class="chat-container"></div>';
        ws.send(JSON.stringify({type:'get_history', chatId:id}));
    }

    function renderMsg(m) {
        const c = document.getElementById('chat-container'); if(!c) return;
        const d = document.createElement('div'); d.className = `msg ${m.senderId===myId?'out':'in'}`;
        d.innerHTML = m.text; c.appendChild(d);
    }

    function sendMsg() { const i = document.getElementById('message-input'); if(!i.value.trim()) return; ws.send(JSON.stringify({type:'text', chatId:currentChat, text:i.value, senderId:myId, senderName:myName})); i.value=''; }
    function handleAuth() { const id=document.getElementById('reg-id').value, p=document.getElementById('reg-pass').value; localStorage.setItem('k_p', p); ws.send(JSON.stringify({type:isReg?'register':'login', userId:id, password:p, name:document.getElementById('reg-name').value||id})); }
    function toggleAuth() { isReg=!isReg; document.getElementById('reg-name').style.display=isReg?'block':'none'; document.getElementById('auth-btn').textContent=isReg?'Создать':'Войти'; }
    function logout() { localStorage.clear(); location.reload(); }
    function updateBadge() { const b=document.getElementById('badge'); b.style.display=myRequests.length?'block':'none'; b.textContent=myRequests.length; }
    function scrollToBottom() { const v=document.getElementById('view-content'); v.scrollTop=v.scrollHeight; }
    function handleSearch(res) { const s=document.getElementById('s-res'); s.innerHTML = res.found ? `<div class="list-item"><div class="avatar">${res.targetName[0]}</div><div style="flex:1">${res.targetName}</div><button onclick="ws.send(JSON.stringify({type:'send_request', targetId:'${res.targetId}'}))" style="background:var(--accent); border:none; color:#fff; padding:10px; border-radius:10px;">Добавить</button></div>` : '<p>Не найден</p>'; }
    
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    document.getElementById('message-input').onkeypress = (e) => { if(e.key==='Enter') sendMsg(); };
</script>
</body>
</html>
