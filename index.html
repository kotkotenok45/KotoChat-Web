<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1c1c1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --border: #38383a; --msg-in: #262629; --text-gray: #8e8e93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { height: 65px; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); justify-content: space-between; z-index: 10; padding-top: env(safe-area-inset-top); }
        .header-info { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .status-text { font-size: 11px; color: var(--text-gray); transition: color 0.3s; }
        .status-online { color: #32d74b; }

        #view-content { flex: 1; overflow-y: auto; scroll-behavior: smooth; background: url('https://i.imgur.com/3Z6YQYt.png') center/cover; } /* Темный паттерн для фона */
        
        .chat-container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 16px; position: relative; word-wrap: break-word; animation: fadeIn 0.2s ease-out; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .msg.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; color: white; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.6); display: block; text-align: right; margin-top: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg audio { max-width: 200px; height: 40px; margin-top: 5px; outline: none; }

        .list-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; background: var(--panel); border-bottom: 1px solid var(--border); transition: 0.2s; }
        .list-item:active { background: #2c2c2e; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #0a84ff, #005bb5); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; flex-shrink: 0; position: relative; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #32d74b; border: 2px solid var(--panel); border-radius: 50%; display: none; }

        #input-area { padding: 10px 15px; background: var(--panel); display: none; gap: 10px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); }
        .attach-btn { background: none; border: none; font-size: 24px; color: var(--text-gray); cursor: pointer; padding: 0; }
        #message-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 15px; border-radius: 20px; font-size: 16px; }
        .action-btn { background: var(--accent); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .recording { background: #ff3b30; animation: pulse 1s infinite; }

        /* Звонки */
        #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #video-wrap { display: none; position: fixed; inset: 0; background: #000; z-index: 1001; flex-direction: column; }
        .remote-v { flex: 1; width: 100%; object-fit: cover; }
        .local-v { width: 100px; height: 150px; position: absolute; top: env(safe-area-inset-top); right: 20px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; transform: scaleX(-1); }

        .nav-bar { height: 60px; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text-gray); cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        
        #typing-indicator { font-size: 12px; color: var(--text-gray); padding: 5px 15px; display: none; background: transparent; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; }
        .auth-card input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; }
        .auth-card button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: bold; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="margin-top:0; font-size: 28px;">KotoChat</h1>
        <p style="color: var(--text-gray); margin-bottom: 20px;">Новый уровень общения</p>
        <input type="text" id="reg-id" placeholder="ID (логин)">
        <input type="text" id="reg-name" placeholder="Ваше имя" style="display:none">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="handleAuth()" id="auth-btn">Войти</button>
        <p onclick="toggleAuth()" id="auth-link" style="color:var(--accent); font-size:14px; cursor:pointer; margin-top:20px;">Создать аккаунт</p>
    </div>
</div>

<div id="call-overlay">
    <div style="font-size: 60px; margin-bottom: 20px;" id="call-type-icon">📞</div>
    <h2 id="caller-name">Имя...</h2>
    <p id="call-status" style="color:#8e8e93">Звонок...</p>
    <div style="display: flex; gap: 40px; margin-top: 40px;">
        <button onclick="endCall()" style="width: 70px; height: 70px; border-radius: 50%; border: none; background: #ff3b30; color: white; font-size: 24px;">✕</button>
        <button id="answer-btn" onclick="acceptCall()" style="width: 70px; height: 70px; border-radius: 50%; border: none; background: #32d74b; color: white; font-size: 24px;">✔</button>
    </div>
</div>
<div id="video-wrap">
    <video id="remote-v" class="remote-v" autoplay playsinline></video>
    <video id="local-v" class="local-v" autoplay playsinline muted></video>
    <button onclick="endCall()" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; border-radius: 50%; border: none; background: #ff3b30; color: white; font-size: 24px; z-index: 1002;">✕</button>
</div>

<header>
    <div id="back-btn" style="display:none; color:var(--accent); font-size:16px;" onclick="showTab('dialogs')">◁ Назад</div>
    <div class="header-info">
        <div id="header-title" style="font-weight:bold; font-size:17px;">KotoChat</div>
        <div id="header-status" class="status-text"></div>
    </div>
    <div id="call-actions" style="display:none; gap:15px;">
        <span onclick="makeCall('audio')" style="font-size:20px;">📞</span>
        <span onclick="makeCall('video')" style="font-size:20px;">📹</span>
    </div>
</header>

<div id="view-content"></div>
<div id="typing-indicator">Печатает...</div>

<div id="input-area">
    <label class="attach-btn">
        📎 <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="sendImage(this)">
    </label>
    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off" oninput="sendTyping()">
    <button id="main-action-btn" class="action-btn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎤</button>
</div>

<nav class="nav-bar">
    <div class="nav-item active" data-tab="dialogs" onclick="showTab('dialogs')"><span style="font-size:24px;">💬</span>Чаты</div>
    <div class="nav-item" data-tab="profile" onclick="showTab('profile')"><span style="font-size:24px;">⚙️</span>Настройки</div>
</nav>

<script>
    let ws;
    let myId = localStorage.getItem('k_id'), myName = localStorage.getItem('k_n'), myPass = localStorage.getItem('k_p');
    let currentChat = null, isReg = false, myFriends = [], myRequests = [], onlineUsers = [];
    
    // WebRTC и Медиа
    let peer, localStream, activeCallerId = null;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    let mediaRecorder, audioChunks = [];
    let typingTimeout;

    function connect() {
        ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
        ws.onopen = () => { if(myId && myPass) ws.send(JSON.stringify({type:'login', userId:myId, password:myPass})); };
        ws.onmessage = async (e) => {
            const res = JSON.parse(e.data);
            
            if(res.type === 'auth_success') {
                myId = res.userId; myName = res.name;
                localStorage.setItem('k_id', myId); localStorage.setItem('k_n', myName);
                document.getElementById('auth-screen').style.display = 'none';
                showTab('dialogs');
            }
            if(res.type === 'user_sync') { myFriends = res.friends; myRequests = res.requests; if(!currentChat) renderDialogs(); }
            if(res.type === 'online_statuses') { onlineUsers = res.onlineIds; updateOnlineStatuses(); }
            if(res.type === 'search_result') handleSearch(res);
            if(res.type === 'history') { const c = document.getElementById('chat-container'); if(c) { c.innerHTML=''; res.messages.forEach(renderMsg); scrollToBottom(); } }
            
            if(['text', 'image', 'audio'].includes(res.type)) {
                if(res.chatId === currentChat) { renderMsg(res); scrollToBottom(); }
            }

            if(res.type === 'typing' && res.fromId === currentChat.replace(myId, '').replace('_', '')) {
                const ind = document.getElementById('typing-indicator');
                ind.style.display = 'block';
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => ind.style.display = 'none', 2000);
            }

            // WebRTC Calls
            if(res.type === 'call_user') { activeCallerId = res.fromId; document.getElementById('call-overlay').style.display = 'flex'; document.getElementById('caller-name').textContent = res.fromName; document.getElementById('answer-btn').style.display = 'flex'; }
            if(res.type === 'webrtc_signal') {
                if(!peer) initPeer(res.fromId);
                if(res.signal.ice) await peer.addIceCandidate(res.signal.ice);
                else {
                    await peer.setRemoteDescription(new RTCSessionDescription(res.signal));
                    if(res.signal.type === 'offer') { const ans = await peer.createAnswer(); await peer.setLocalDescription(ans); ws.send(JSON.stringify({type:'webrtc_signal', targetId:res.fromId, signal:ans})); }
                }
            }
            if(res.type === 'call_cancelled' || res.type === 'reject_call') endCall();
            if(res.type === 'error') { alert(res.text); if(res.text.includes("входа")) { localStorage.clear(); document.getElementById('auth-screen').style.display = 'flex'; } }
        };
        ws.onclose = () => setTimeout(connect, 2000);
    }
    connect();

    function showTab(t) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.tab === t));
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('call-actions').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('header-status').textContent = '';
        
        if(t === 'dialogs') {
            currentChat = null;
            document.getElementById('header-title').textContent = 'Чаты';
            renderDialogs();
        } else {
            document.getElementById('header-title').textContent = 'Настройки';
            document.getElementById('view-content').innerHTML = `
                <div style="padding:40px 20px; text-align:center;">
                    <div class="avatar" style="margin: 0 auto 20px; width:120px; height:120px; font-size:48px;">${myName?myName[0]:'?'}</div>
                    <h2 style="margin:0">${myName}</h2>
                    <p style="color:var(--text-gray);">@${myId}</p>
                    <button onclick="logout()" style="background:#1c1c1e; color:#ff3b30; border:1px solid #ff3b30; padding:15px; border-radius:15px; width:100%; margin-top:30px; font-weight:bold;">Выйти из аккаунта</button>
                </div>`;
        }
    }

    function renderDialogs() {
        let html = `
            <div style="padding:15px;">
                <input type="text" id="find-id" placeholder="Поиск по ID..." onchange="ws.send(JSON.stringify({type:'search_user', targetId: this.value}))" style="width:100%; background:var(--panel); border:none; color:#fff; padding:12px 15px; border-radius:12px;">
                <div id="search-box"></div>
            </div>`;

        myRequests.forEach(r => { html += `<div class="list-item"><div class="avatar">${r.name[0]}</div><div style="flex:1">${r.name}</div><button onclick="ws.send(JSON.stringify({type:'accept_request', targetId:'${r.id}'}))" style="background:#32d74b; border:none; color:#fff; padding:8px 15px; border-radius:10px;">Принять</button></div>`; });
        html += `<div class="list-item" onclick="openChat('global', 'Общий чат')"><div class="avatar">🌍</div><div style="flex:1"><b>Общий чат</b></div></div>`;

        myFriends.forEach(f => { 
            const isOnline = onlineUsers.includes(f.id);
            html += `
            <div class="list-item" onclick="openChat('${[myId, f.id].sort().join('_')}', '${f.name}', '${f.id}')">
                <div class="avatar">${f.name[0]}<div class="online-dot" style="display:${isOnline?'block':'none'}"></div></div>
                <div><b>${f.name}</b><br><span style="font-size:13px; color:var(--text-gray)">${isOnline?'В сети':'Был(а) недавно'}</span></div>
            </div>`; 
        });
        document.getElementById('view-content').innerHTML = html;
    }

    function openChat(id, name, targetUserId = null) {
        currentChat = id;
        document.getElementById('header-title').textContent = name;
        if(targetUserId) {
            const isOnline = onlineUsers.includes(targetUserId);
            const statusEl = document.getElementById('header-status');
            statusEl.textContent = isOnline ? 'в сети' : 'был(а) недавно';
            statusEl.className = `status-text ${isOnline ? 'status-online' : ''}`;
        }
        
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('input-area').style.display = 'flex';
        document.getElementById('call-actions').style.display = (id === 'global') ? 'none' : 'flex';
        document.getElementById('view-content').innerHTML = '<div id="chat-container" class="chat-container"></div>';
        ws.send(JSON.stringify({type:'get_history', chatId: id}));
    }

    // --- ОТПРАВКА СООБЩЕНИЙ ---
    function sendText() {
        const i = document.getElementById('message-input');
        if(!i.value.trim()) return;
        ws.send(JSON.stringify({type:'text', chatId: currentChat, text: i.value, senderId: myId, senderName: myName}));
        i.value = ''; updateInputIcon();
    }

    function sendTyping() {
        updateInputIcon();
        if(currentChat && currentChat !== 'global') {
            const target = currentChat.replace(myId, '').replace('_', '');
            ws.send(JSON.stringify({type:'typing', targetId: target}));
        }
    }

    function updateInputIcon() {
        const i = document.getElementById('message-input');
        const btn = document.getElementById('main-action-btn');
        if(i.value.trim() !== '') { btn.innerHTML = '➤'; btn.onclick = sendText; btn.onmousedown = null; btn.ontouchstart = null; } 
        else { btn.innerHTML = '🎤'; btn.onclick = null; btn.onmousedown = startVoice; btn.ontouchstart = startVoice; }
    }

    // --- КАРТИНКИ (Base64) ---
    function sendImage(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            ws.send(JSON.stringify({type:'image', chatId: currentChat, text: e.target.result, senderId: myId, senderName: myName}));
        };
        reader.readAsDataURL(file);
    }

    // --- ГОЛОСОВЫЕ СООБЩЕНИЯ ---
    async function startVoice() {
        if(document.getElementById('message-input').value.trim() !== '') return;
        document.getElementById('main-action-btn').classList.add('recording');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                ws.send(JSON.stringify({type:'audio', chatId: currentChat, text: reader.result, senderId: myId, senderName: myName}));
            };
            audioChunks = [];
        };
        mediaRecorder.start();
    }
    
    function stopVoice() {
        if(mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            document.getElementById('main-action-btn').classList.remove('recording');
        }
    }

    // --- РЕНДЕР СООБЩЕНИЙ ---
    function formatTime(ts) {
        const d = new Date(ts);
        return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    function renderMsg(m) {
        const res = document.getElementById('chat-container'); if(!res) return;
        const d = document.createElement('div');
        const isMe = m.senderId === myId;
        d.className = `msg ${isMe ? 'out' : 'in'}`;
        
        let content = '';
        if(m.type === 'text') content = m.text;
        else if(m.type === 'image') content = `<img src="${m.text}">`;
        else if(m.type === 'audio') content = `<audio controls src="${m.text}"></audio>`;

        d.innerHTML = `${!isMe ? `<small style="display:block; color:#0a84ff; font-weight:bold; margin-bottom:4px; font-size:12px;">${m.senderName}</small>` : ''}
                       ${content}
                       <span class="msg-time">${formatTime(m.timestamp)} ${isMe ? '✓✓' : ''}</span>`;
        res.appendChild(d);
    }

    // --- WEBRTC ЗВОНКИ ---
    async function makeCall(type) {
        activeCallerId = currentChat.replace(myId, '').replace('_', '');
        document.getElementById('call-overlay').style.display = 'flex'; document.get
