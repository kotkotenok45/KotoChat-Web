<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KotoChat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <style>
        :root {
            --bg-main: #020617;
            --bg-side: #0f172a;
            --accent: #3b82f6;
            --text-primary: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 5px var(--danger);
        }

        .status-online { 
            background: var(--success); 
            box-shadow: 0 0 8px var(--success);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .item-card {
            padding: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .item-card:hover { 
            background: rgba(255,255,255,0.07); 
            border-color: var(--border);
        }

        .active-room {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #view-header {
            padding: 1rem 2rem;
            background: var(--bg-side);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        #video-grid {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 15px;
            background: #000;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 6px;
            background: #1e293b;
        }

        #messages-flow {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 4px;
            background: var(--bg-side);
            border-left: 3px solid var(--accent);
            align-self: flex-start;
        }

        .controls {
            padding: 25px;
            background: var(--bg-main);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
        }

        input {
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 4px;
            flex: 1;
            outline: none;
        }

        button {
            padding: 10px 24px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: var(--accent);
            color: white;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        .call-btn { background: var(--success); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="icon.png" width="28" height="28" alt="K">
            <span style="letter-spacing: 1px; font-weight: 800;">KOTOCHAT</span>
        </div>
        <div id="status-indicator" class="status-dot"></div>
    </div>
    
    <div class="list-container">
        <div id="groups-list">
            <div class="item-card active-room" onclick="joinRoom('main-hq', this)">[ СЕРВЕР: ГЛАВНЫЙ ]</div>
        </div>
        <button onclick="createNewChannel()" style="width:100%; margin-top:15px; background: transparent; border: 1px dashed var(--border);">+ СОЗДАТЬ КАНАЛ</button>
    </div>
</div>

<div id="main-chat">
    <div id="view-header">
        <h3 id="current-title">ГЛАВНЫЙ</h3>
        <button class="call-btn" id="call-trigger">ЗВОНОК</button>
    </div>

    <div id="video-grid"></div>

    <div id="messages-flow"></div>

    <div class="controls">
        <input type="text" id="msg-field" placeholder="Введите сообщение в защищенный канал...">
        <button onclick="sendData()">ОТПРАВИТЬ</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let peer;
    let activeConnections = [];
    const serverHost = 'kotkotenok43-kotochat-server.hf.space';
    const indicator = document.getElementById('status-indicator');

    function connectToServer() {
        peer = new Peer('koto-' + Math.random().toString(36).substr(2, 5), {
            host: serverHost,
            port: 443,
            path: '/myapp',
            secure: true
        });

        peer.on('open', () => {
            indicator.classList.add('status-online');
        });

        peer.on('error', () => {
            indicator.classList.remove('status-online');
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                pushMessage(data.user, data.msg);
            });
        });

        peer.on('call', (call) => {
            if(confirm("Входящий вызов. Принять?")) {
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    call.answer(stream);
                    handleStream(call);
                });
            }
        });
    }

    function sendData() {
        const input = document.getElementById('msg-field');
        if(!input.value) return;
        
        const payload = { user: peer.id, msg: input.value };
        pushMessage('Вы', input.value);
        
        activeConnections.forEach(conn => conn.send(payload));
        input.value = '';
    }

    function pushMessage(user, text) {
        const flow = document.getElementById('messages-flow');
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerHTML = `<small style="color:var(--text-dim); font-size:10px">${user}</small><div style="margin-top:5px">${text}</div>`;
        flow.appendChild(msg);
        flow.scrollTop = flow.scrollHeight;
    }

    function createNewChannel() {
        const name = prompt("Введите идентификатор канала:");
        if(name) {
            const list = document.getElementById('groups-list');
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerText = `[ КАНАЛ: ${name.toUpperCase()} ]`;
            div.onclick = function() { joinRoom(name, this); };
            list.appendChild(div);
        }
    }

    function joinRoom(id, el) {
        document.querySelectorAll('.item-card').forEach(item => item.classList.remove('active-room'));
        el.classList.add('active-room');
        document.getElementById('current-title').innerText = id.toUpperCase();
        document.getElementById('messages-flow').innerHTML = '';
        
        const targetId = prompt("Введите ID собеседника для подключения к каналу (его ID в углу сообщения):");
        if(targetId) {
            const conn = peer.connect(targetId);
            activeConnections.push(conn);
        }
    }

    document.getElementById('call-trigger').onclick = async () => {
        const targetId = prompt("Введите ID для звонка:");
        if(targetId) {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            showLocalVideo(stream);
            const call = peer.call(targetId, stream);
            handleStream(call);
        }
    };

    function showLocalVideo(stream) {
        const grid = document.getElementById('video-grid');
        grid.style.display = 'grid';
        const v = document.createElement('video');
        v.srcObject = stream;
        v.muted = true;
        v.play();
        grid.appendChild(v);
    }

    function handleStream(call) {
        call.on('stream', userStream => {
            const grid = document.getElementById('video-grid');
            grid.style.display = 'grid';
            const v = document.createElement('video');
            v.srcObject = userStream;
            v.play();
            grid.appendChild(v);
        });
    }

    window.onload = connectToServer;
</script>
</body>
</html>
