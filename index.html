<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/512/512638.png">
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --text: #fff; --border: #38383a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: calc(env(safe-area-inset-top) + 10px) 20px 10px; background: var(--panel); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #view-content { flex: 1; overflow-y: auto; padding-bottom: 150px; }

        /* ЧАТ */
        .chat-container { display: flex; flex-direction: column; padding: 15px; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 16px; position: relative; }
        .msg.in { align-self: flex-start; background: #262629; border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .sender-name { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 2px; display: block; }

        /* ПОИСК И ДРУЗЬЯ */
        .search-box { padding: 15px; display: flex; gap: 10px; }
        .search-box input { flex: 1; background: #1c1c1e; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 10px; }
        .user-row { padding: 15px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        /* ПАНЕЛЬ ВВОДА */
        #input-area { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 65px); left: 0; right: 0; background: var(--panel); padding: 10px; display: flex; gap: 10px; border-top: 0.5px solid var(--border); }
        #message-input { flex: 1; background: #000; border: none; color: #fff; padding: 12px; border-radius: 20px; }

        /* МЕНЮ */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); display: flex; height: calc(env(safe-area-inset-bottom) + 65px); border-top: 0.5px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #8e8e93; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; width: 90%; max-width: 340px; text-align: center; }
        input { width: 100%; background: #2c2c2e; border: none; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2>KotoChat</h2>
        <input type="text" id="reg-id" placeholder="ID (логин)">
        <input type="text" id="reg-name" placeholder="Имя" style="display:none">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="handleAuth()" id="auth-btn">Войти</button>
        <p onclick="toggleMode()" id="auth-toggle" style="color:var(--accent); cursor:pointer; margin-top:15px">Нет аккаунта? Регистрация</p>
    </div>
</div>

<header>
    <div id="header-title" style="font-weight:bold; font-size:18px">Чат</div>
    <div style="color:#32d74b; font-size:12px">● Online</div>
</header>

<div id="view-content">
    <div id="chat-container" class="chat-container"></div>
</div>

<div id="input-area">
    <input type="text" id="message-input" placeholder="Сообщение...">
    <button onclick="send()" style="width:auto; background:none; color:var(--accent)">ОТПР.</button>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('global', this)"><div>💬</div>Чат</div>
    <div class="nav-item" onclick="showTab('friends', this)"><div>👥</div>Друзья</div>
    <div class="nav-item" onclick="showTab('profile', this)"><div>⚙️</div>Профиль</div>
</nav>

<script>
    const ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
    let myId, myName, isReg = false;

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('auth-btn').textContent = isReg ? 'Создать аккаунт' : 'Войти';
        document.getElementById('reg-name').style.display = isReg ? 'block' : 'none';
    }

    function handleAuth() {
        ws.send(JSON.stringify({
            type: isReg ? 'register' : 'login',
            userId: document.getElementById('reg-id').value,
            name: document.getElementById('reg-name').value || 'User',
            password: document.getElementById('reg-pass').value
        }));
    }

    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        if (res.type === 'auth_success') {
            myId = res.userId; myName = res.name;
            document.getElementById('auth-screen').classList.add('hidden');
        } else if (res.type === 'history') {
            document.getElementById('chat-container').innerHTML = '';
            res.messages.forEach(renderMsg);
        } else if (res.type === 'text') {
            renderMsg(res);
        }
    };

    function send() {
        const inp = document.getElementById('message-input');
        if (!inp.value) return;
        ws.send(JSON.stringify({ type: 'text', text: inp.value, senderId: myId, senderName: myName }));
        inp.value = '';
    }

    function renderMsg(msg) {
        const cont = document.getElementById('chat-container');
        if (!cont) return;
        const div = document.createElement('div');
        const isOwn = msg.senderId === myId;
        div.className = `msg ${isOwn ? 'out' : 'in'}`;
        div.innerHTML = `${!isOwn ? `<span class="sender-name">${msg.senderName}</span>` : ''}${msg.text}`;
        cont.appendChild(div);
        document.getElementById('view-content').scrollTop = cont.scrollHeight;
    }

    function showTab(tab, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const content = document.getElementById('view-content');
        const input = document.getElementById('input-area');

        if (tab === 'global') {
            input.classList.remove('hidden');
            content.innerHTML = '<div id="chat-container" class="chat-container"></div>';
            ws.send(JSON.stringify({ type: 'login', userId: myId, password: "" })); 
        } 
        else if (tab === 'friends') {
            input.classList.add('hidden');
            content.innerHTML = `
                <div class="search-box">
                    <input type="text" id="find-id" placeholder="Введите ID друга...">
                    <button onclick="startPrivateChat()" style="width:100px">Найти</button>
                </div>
                <div id="friends-list">
                    <div class="user-row"><span>Общий чат</span><button onclick="showTab('global', document.querySelector('.nav-item'))" style="width:auto; padding:5px 15px">Открыть</button></div>
                </div>`;
        } 
        else if (tab === 'profile') {
            input.classList.add('hidden');
            content.innerHTML = `
                <div style="padding:40px; text-align:center">
                    <div style="width:80px; height:80px; background:var(--accent); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:30px">👤</div>
                    <h2>${myName}</h2>
                    <p style="opacity:0.6">Ваш ID: ${myId}</p>
                    <button onclick="location.reload()" style="background:#ff3b30; margin-top:30px">ВЫЙТИ ИЗ АККАУНТА</button>
                </div>`;
        }
    }

    function startPrivateChat() {
        const id = document.getElementById('find-id').value;
        if(id) alert('Запрос к пользователю ' + id + ' отправлен! (Функция ЛС будет активна при наличии второго игрока)');
    }

    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') send() };
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
