<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoChat</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/512/512638.png" type="image/png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/512/512638.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --bg: #000; --panel: #1c1c1e; --accent: #0a84ff; --text: #fff; --border: #38383a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        @media (min-width: 700px) {
            body { background: #080808; }
            .app-container { max-width: 500px; margin: 0 auto; width: 100%; height: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; background: var(--bg); }
        }

        header { padding: calc(env(safe-area-inset-top) + 10px) 20px 10px; background: var(--panel); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #main-view { flex: 1; overflow-y: auto; padding-bottom: 160px; scroll-behavior: smooth; }
        
        .chat-container { display: flex; flex-direction: column; padding: 15px; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 16px; line-height: 1.4; position: relative; }
        .msg.in { align-self: flex-start; background: #262629; border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .sender-name { font-size: 11px; opacity: 0.5; margin-bottom: 3px; display: block; }

        #input-area { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 65px); left: 0; right: 0; background: var(--panel); border-top: 0.5px solid var(--border); padding: 10px 15px; display: flex; gap: 10px; z-index: 200; }
        @media (min-width: 700px) { #input-area { max-width: 500px; left: 50%; transform: translateX(-50%); } }
        #message-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 18px; border-radius: 25px; font-size: 16px; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,0.95); backdrop-filter: blur(15px); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); padding-top: 10px; height: calc(env(safe-area-inset-bottom) + 65px); z-index: 200; }
        @media (min-width: 700px) { nav { max-width: 500px; left: 50%; transform: translateX(-50%); } }
        .nav-item { color: #8e8e93; font-size: 11px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 24px; margin-bottom: 2px; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 25px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .auth-card img { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 10px; }
        .auth-card input { background: #2c2c2e; border: none; color: #fff; padding: 15px; border-radius: 15px; font-size: 16px; width: 100%; }
        .auth-card button { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; }

        .hidden { display: none !important; }
        #install-prompt { background: #fff; color: #000; border: none; padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen">
        <div class="auth-card">
            <img src="https://cdn-icons-png.flaticon.com/512/512/512638.png" alt="Logo">
            <h2 style="margin:0">KotoChat</h2>
            <input type="text" id="reg-id" placeholder="ID (логин)">
            <input type="text" id="reg-name" placeholder="Имя" style="display:none">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button onclick="handleAuth()" id="auth-btn">Войти</button>
            <p id="auth-toggle" style="color:var(--accent); font-size:14px; cursor:pointer; margin-top:10px" onclick="toggleMode()">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <header>
        <div style="font-weight:bold; font-size:20px" id="view-title">Чат</div>
        <button id="install-prompt" class="hidden">УСТАНОВИТЬ</button>
    </header>

    <div id="main-view">
        <div id="chat-container" class="chat-container"></div>
    </div>

    <div id="input-area" class="hidden">
        <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
        <button onclick="send()" style="background:none; border:none; color:var(--accent); font-weight:bold; font-size:16px; padding-left:10px">ОТПР.</button>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('global', this)"><div class="nav-icon">💬</div>Чат</div>
        <div class="nav-item" onclick="switchTab('contacts', this)"><div class="nav-icon">👤</div>Друзья</div>
        <div class="nav-item" onclick="switchTab('settings', this)"><div class="nav-icon">⚙️</div>Профиль</div>
    </nav>
</div>

<script>
    const ws = new WebSocket('wss://kotkotenok43-kotochat-server.hf.space');
    let myId, myName, isReg = false;

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-prompt').classList.remove('hidden');
    });

    document.getElementById('install-prompt').onclick = () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            document.getElementById('install-prompt').classList.add('hidden');
        }
    };

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('auth-btn').textContent = isReg ? 'Создать аккаунт' : 'Войти';
        document.getElementById('reg-name').style.display = isReg ? 'block' : 'none';
        document.getElementById('auth-toggle').textContent = isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация';
    }

    function handleAuth() {
        const data = {
            type: isReg ? 'register' : 'login',
            userId: document.getElementById('reg-id').value,
            name: document.getElementById('reg-name').value,
            password: document.getElementById('reg-pass').value
        };
        ws.send(JSON.stringify(data));
    }

    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        if (res.type === 'auth_success') {
            myId = res.userId; myName = res.name;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
        } else if (res.type === 'history') {
            document.getElementById('chat-container').innerHTML = '';
            res.messages.forEach(renderMsg);
        } else if (res.type === 'text') {
            renderMsg(res);
        } else if (res.type === 'error') alert(res.text);
    };

    function send() {
        const inp = document.getElementById('message-input');
        if (!inp.value) return;
        ws.send(JSON.stringify({ type: 'text', text: inp.value, senderId: myId, senderName: myName }));
        inp.value = '';
    }

    function renderMsg(msg) {
        const cont = document.getElementById('chat-container');
        if (!cont) return;
        const div = document.createElement('div');
        const isOwn = msg.senderId === myId;
        div.className = `msg ${isOwn ? 'out' : 'in'}`;
        div.innerHTML = `${!isOwn ? `<span class="sender-name">${msg.senderName}</span>` : ''}${msg.text}`;
        cont.appendChild(div);
        document.getElementById('main-view').scrollTop = cont.scrollHeight;
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const view = document.getElementById('main-view');
        const input = document.getElementById('input-area');
        
        if (tab === 'settings') {
            input.classList.add('hidden');
            view.innerHTML = `<div style="padding:50px; text-align:center"><h2>${myName}</h2><p style="color:var(--accent)">ID: ${myId}</p><button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #ff3b30; color:#ff3b30; padding:10px 20px; border-radius:12px">Выйти</button></div>`;
        } else if (tab === 'global') {
            input.classList.remove('hidden');
            view.innerHTML = '<div id="chat-container" class="chat-container"></div>';
            ws.send(JSON.stringify({ type: 'login', userId: myId, password: "" })); 
        } else {
            input.classList.add('hidden');
            view.innerHTML = '<div style="padding:50px; text-align:center; color:#8e8e93">Контакты будут доступны в обновлении</div>';
        }
    }
    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') send() };
</script>
</body>
</html>
